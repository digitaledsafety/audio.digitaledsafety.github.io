<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio</title>
    <link rel="manifest" href="{{ "/manifest.json" | relative_url }}">
    <script src="https://cdn.digitaleducationsafety.org/packages/tailwindcss@3.4.17/tailwindcss.js"></script>
    <base target="_top">
    <style>
        /* Custom styles for better visual appeal */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent scrolling of the body */
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
        }
        .audio-editor-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            box-sizing: border-box;
            position: relative;
        }
        #visualizer-view {
            height: 100%;
            position: absolute;
            inset: 0;
            z-index: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #visualizer-view.active {
            z-index: 10;
            visibility: visible;
            pointer-events: auto;
        }
        #workspace-view {
            position: absolute;
            inset: 0;
            z-index: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #workspace-view.active {
            z-index: 10;
            visibility: visible;
            pointer-events: auto;
        }
        .button {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out, transform 0.1s ease-in-out;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        #bottom-nav {
            background-color: #f0f2f5;
        }
        #bottom-nav .button {
            padding: 0.25rem 0.5rem;
        }
        .button-primary {
            background-color: #4f46e5;
            color: white;
        }
        .button-primary:hover {
            background-color: #4338ca;
            transform: translateY(-1px);
        }
        .button-secondary {
            background-color: #e0e7ff;
            color: #4f46e5;
            border: 1px solid #a5b4fc;
        }
        .button-secondary:hover {
            background-color: #c7d2fe;
            transform: translateY(-1px);
        }
        .button-danger {
            background-color: #ef4444;
            color: white;
        }
        .button-danger:hover {
            background-color: #dc2626;
            transform: translateY(-1px);
        }
        .message-box {
            background-color: #fffbeb;
            color: #9a3412;
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid #fcd34d;
            margin-top: 1rem;
            text-align: center;
        }
        .message-box.success {
            background-color: #ecfdf5;
            color: #065f46;
            border-color: #34d399;
        }

        /* AudioEditor specific styles */
        #audio-editor-container {
            width: 100%;
            height: 100%;
            background-color: #f9fafb;
            overflow: hidden; /* Ensures content stays within bounds */
        }
        .node {
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 0.75rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            padding: 1rem;
            color: #1f2937;
            font-weight: 500;
            min-width: 180px;
            box-sizing: border-box;
        }
        .node.selected {
            border-color: #4f46e5;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }
        .node .title {
            font-weight: 600;
            font-size: 1.125rem; /* text-lg */
            margin-bottom: 0.75rem;
            text-align: center;
            color: #374151;
        }
        .node .input, .node .output {
            display: flex;
            align-items: center;
            margin-bottom: 0.25rem;
        }
        .node .input-title, .node .output-title {
            flex-grow: 1;
            font-size: 0.75rem; /* text-xs */
            color: #4b5563;
            white-space: nowrap;
        }
        .socket {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #1f2937; /* Deep hole look */
            border: 3px solid;
            border-color: #9ca3af #6b7280 #4b5563 #9ca3af; /* Metallic gradient effect */
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            position: relative;
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.8), 0 1px 1px rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .socket::after {
            content: '';
            width: 8px;
            height: 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.1);
        }
        .socket.input {
            margin-right: 0.5rem;
        }
        .socket.output {
            margin-left: 0.5rem;
            background: #4338ca; /* Darker indigo for output 'jack' */
            border-color: #818cf8 #4f46e5 #3730a3 #818cf8;
        }
        .socket:hover {
            border-color: #4f46e5;
            transform: scale(1.1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 0 8px rgba(79, 70, 229, 0.4);
        }
        /* Custom control styling */
        .control {
            margin-top: 0.75rem;
            margin-bottom: 0.5rem;
        }
        .control label {
            display: block;
            font-size: 0.875rem;
            color: #ffffff;
            margin-bottom: 0.25rem;
            text-align: center;
        }
        .control input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            height: 8px;
            background: #d1d5db;
            border-radius: 5px;
            outline: none;
            opacity: 0.7;
            transition: opacity .2s;
            margin-top: 0.5rem;
        }
        .control input[type="text"] {
            width: 100%;
            padding: 0.5rem;
            border-radius: 0.25rem;
            border: 1px solid #d1d5db;
            background-color: #fff;
            color: #374151;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        .control input[type="range"]:hover {
            opacity: 1;
        }
        .control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        .control input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        .control .value-display {
            min-width: 40px;
            text-align: center;
            font-weight: 500;
            color: #ffffff;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }
        .control select {
            width: 100%;
            padding: 0.25rem;
            border-radius: 0.25rem;
            border: 1px solid #d1d5db;
            background-color: #fff;
            color: #374151;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        .clock-indicator {
            width: 16px;
            height: 16px;
            background-color: #777;
            border-radius: 50%;
            margin: 10px auto;
            transition: background-color 0.05s ease-in-out;
            border: 2px solid #333;
        }
        .clock-indicator.blinking {
            background-color: #ff4500; /* Bright orange */
        }
        #hero-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 9999;
        }
        #hero-overlay h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        #hero-overlay p {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            max-width: 600px;
        }
        #cta-button {
            padding: 1rem 2rem;
            font-size: 1.25rem;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out;
        }
        #cta-button:hover {
            background-color: #4338ca;
        }
    </style>
</head>
<body>
    <div id="hero-overlay">

        <p>Create, experiment, and share your sound with a powerful node-based synthesizer, right here in your browser.</p>
        <button id="cta-button">Enter the Studio</button>
    </div>
    <div class="fixed top-4 right-4 z-50 bg-indigo-600/80 text-white text-xs font-bold px-2 py-1 rounded shadow-md pointer-events-none">BETA</div>
    <div class="audio-editor-container">

        <div id="workspace-view" class="flex-grow h-full active">
            {{ content }}
            <div id="audio-editor-container" class="relative h-full"></div>
        </div>
        
        <div id="visualizer-view" class="h-full">
            <canvas id="visualizer" class="w-full h-full border-none"></canvas>
        </div>

        <!-- Bottom Navigation Bar -->

            </div>

                <div class="relative inline-block text-left">

                        <div class="grid grid-cols-2 gap-2" role="menu" aria-orientation="vertical" aria-labelledby="options-menu">

                            <button id="addNoiseGeneratorNodeBtn" class="button button-secondary w-full text-xs">🌫️ Noise Gen</button>
                            <button id="addWavePlayerNodeBtn" class="button button-secondary w-full text-xs">🎵 Wave Player</button>
                            <button id="addChordGeneratorNodeBtn" class="button button-secondary w-full text-xs">🎼 Chord Gen</button>
                            <button id="addVCANodeBtn" class="button button-secondary w-full text-xs">🎚️ VCA</button>
                            <button id="addMasterGainOutputNodeBtn" class="button button-secondary w-full text-xs">🔊 Master</button>
                            <button id="addFilterNodeBtn" class="button button-secondary w-full text-xs">📉 Filter</button>
                            <button id="addDelayNodeBtn" class="button button-secondary w-full text-xs">⏳ Delay</button>
                            <button id="addDistortionNodeBtn" class="button button-secondary w-full text-xs">🎸 Distortion</button>
                            <button id="addCompressorNodeBtn" class="button button-secondary w-full text-xs">📊 Compressor</button>
                            <button id="addReverbNodeBtn" class="button button-secondary w-full text-xs">🏞️ Reverb</button>
                            <button id="addArpeggiatorNodeBtn" class="button button-secondary w-full text-xs">🎹 Arpeggiator</button>
                            <button id="addLFONodeBtn" class="button button-secondary w-full text-xs">🌊 LFO</button>
                            <button id="addADSREnvelopeNodeBtn" class="button button-secondary w-full text-xs">✉️ ADSR</button>
                            <button id="addBitcrusherNodeBtn" class="button button-secondary w-full text-xs">👾 Bitcrusher</button>
                            <button id="addSequencerNodeBtn" class="button button-secondary w-full text-xs">🎶 Sequencer</button>
                            <button id="addAttenuverterNodeBtn" class="button button-secondary w-full text-xs">🔄 Attenuverter</button>
                            <button id="addMasterClockNodeBtn" class="button button-secondary w-full text-xs">⏱️ Master Clock</button>
                            <button id="addVocoderNodeBtn" class="button button-secondary w-full text-xs">🗣️ Vocoder</button>
                            <button id="addMicrophoneInputNodeBtn" class="button button-secondary w-full text-xs">🎤 Mic Input</button>
                            <button id="addGranularSynthesizerNodeBtn" class="button button-secondary w-full text-xs">✨ Granular</button>
                            <button id="addManualGateNodeBtn" class="button button-secondary w-full text-xs">🔳 Manual Gate</button>

                    <button id="settingsToggle" class="button button-secondary">⚙️</button>
                    <div id="settingsDropdown" class="max-h-[85vh] overflow-y-auto origin-bottom-right absolute right-0 bottom-full mb-2 w-80 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 focus:outline-none hidden z-30 p-4 flex flex-col gap-4">

                            <button id="loadWorkspaceBtn" class="button button-secondary">🔄 Load Selected</button>

                                <button id="exportWorkspaceBtn" class="button button-secondary">📤 Export</button>
                                <input type="file" id="importWorkspaceInput" class="hidden">
                                <button id="importWorkspaceBtn" class="button button-secondary">📥 Import</button>

    <script type="text/javascript" src="https://cdn.digitaleducationsafety.org/packages/peerjs@1.5.5/peerjs.min.js"></script>
    <script src="{{ "assets/js/mini-notation-parser.js" | relative_url }}"></script>
    <script src="{{ "assets/js/audio-editor.js" | relative_url }}"></script>
    <script src="{{ "assets/js/audio-engines.js" | relative_url }}"></script>
    <script src="{{ "assets/js/audio-nodes.js" | relative_url }}"></script>

    <script>
        // Global variables for Web Audio API
        var audioContext;
        const audioNodes = new Map();
        window.audioNodes = audioNodes;

        // UI Elements
        const addToneGeneratorNodeBtn = document.getElementById('addToneGeneratorNodeBtn');
        const addNoiseGeneratorNodeBtn = document.getElementById('addNoiseGeneratorNodeBtn');
        const addWavePlayerNodeBtn = document.getElementById('addWavePlayerNodeBtn');
        const addChordGeneratorNodeBtn = document.getElementById('addChordGeneratorNodeBtn');
        const addVCANodeBtn = document.getElementById('addVCANodeBtn');
        const addMasterGainOutputNodeBtn = document.getElementById('addMasterGainOutputNodeBtn');
        const addFilterNodeBtn = document.getElementById('addFilterNodeBtn');
        const addDelayNodeBtn = document.getElementById('addDelayNodeBtn');
        const addArpeggiatorNodeBtn = document.getElementById('addArpeggiatorNodeBtn');
        const addLFONodeBtn = document.getElementById('addLFONodeBtn');
        const addADSREnvelopeNodeBtn = document.getElementById('addADSREnvelopeNodeBtn');
        const addBitcrusherNodeBtn = document.getElementById('addBitcrusherNodeBtn');
        const addSequencerNodeBtn = document.getElementById('addSequencerNodeBtn');
        const addAttenuverterNodeBtn = document.getElementById('addAttenuverterNodeBtn');
        const addMasterClockNodeBtn = document.getElementById('addMasterClockNodeBtn');
        const addVocoderNodeBtn = document.getElementById('addVocoderNodeBtn');
        const addMicrophoneInputNodeBtn = document.getElementById('addMicrophoneInputNodeBtn');
        const addGranularSynthesizerNodeBtn = document.getElementById('addGranularSynthesizerNodeBtn');
        const addManualGateNodeBtn = document.getElementById('addManualGateNodeBtn');
        const addQuantizerNodeBtn = document.getElementById('addQuantizerNodeBtn');
        const addDrumMachineNodeBtn = document.getElementById('addDrumMachineNodeBtn');
        const addMixerNodeBtn = document.getElementById('addMixerNodeBtn');
        const addStereoPannerNodeBtn = document.getElementById('addStereoPannerNodeBtn');
        const clearEditorBtn = document.getElementById('clearEditorBtn');
        const messageBox = document.getElementById('messageBox');
        const recordBtn = document.getElementById('recordBtn');
        const playStopBtn = document.getElementById('playStopBtn');


        // Editor Instance
        let editor;
        let mediaRecorder;
        let recordedChunks = [];
        let recordedMediaUrl = null;
        let masterGain;
        let analyser;
        let mediaStreamDestination;
        let loopSource;
        let multiplayer;
        let _isLocalChange = true;
        // --- Main Controls Logic ---
        let audioState = 'stopped'; // 'stopped', 'playing'        

        // --- Utility Functions ---

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        function editorToJSON() {
            const nodes = [];
            for (const node of editor.getNodes()) {
                nodes.push({
                    id: node.id,
                    label: node.label,
                    data: node.data,
                    position: node.position
                });
            }

            const connections = [];
            for (const conn of editor.getConnections()) {
                connections.push({
                    id: conn.id,
                    source: conn.source,
                    sourceOutput: conn.sourceOutput,
                    target: conn.target,
                    targetInput: conn.targetInput
                });
            }

            return {
                workspaceFormatVersion: '2.0',
                connectionType: editor.connectionType,
                nodes,
                connections
            };
        }

        async function editorFromJSON(json) {
            try
            {                
                console.log('Loading editor from JSON:', json);
                await editor.clear();

                if (json.connectionType) {
                    editor.connectionType = json.connectionType;
                }

                // Stage 1: Create and add all nodes to the editor's data model.
                for (const nodeData of json.nodes) {
                    const Constructor = NodeRegistry.getConstructor(nodeData.label);
                    if (Constructor) {
                        const node = new Constructor();
                        node.id = nodeData.id;

                        // Overwrite default data with saved data.
                        node.data = { ...node.data, ...nodeData.data };

                        // Re-apply control values from data to the control objects.
                        for (const key in node.controls) {
                            if (node.data.hasOwnProperty(key)) {
                                if(node.controls[key]) {
                                    node.controls[key].value = node.data[key];
                                }
                            }
                        }

                        if (typeof node.onDataLoaded === 'function') {
                            node.onDataLoaded();
                        }

                        node.position = nodeData.position || { x: 0, y: 0 };
                        await editor.addNode(node);
                    } else {
                        console.warn(`Node type "${nodeData.label}" not found.`);
                    }
                }

                // Stage 2: Create all connections now that all nodes exist in the model.
                for (const connData of json.connections) {
                    const sourceNode = editor.getNode(connData.source);
                    const targetNode = editor.getNode(connData.target);

                    if (sourceNode && targetNode) {
                        const sourceOutput = connData.sourceOutput;
                        const targetInput = connData.targetInput;
                        
                        await editor.addConnection(new AudioConnection(sourceNode, sourceOutput, targetNode, targetInput));
                    }
                }
                
                // Stage 3: Zoom to fit all nodes.
                requestAnimationFrame(async () => {
                    editor.zoomAt(editor.getNodes());
                });   
            }
            catch (error) {
                showMessage('Error syncing workspace: ' + error.message, 'error');
            }
        }          

        function getWorkspaces() {
            const workspaces = localStorage.getItem('rete-workspaces');
            return workspaces ? JSON.parse(workspaces) : {};
        }

        function populateWorkspacesDropdown() {
            const workspaces = getWorkspaces();
            const selector = document.getElementById('workspaceSelector');
            selector.innerHTML = '';
            for (const name in workspaces) {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                selector.appendChild(option);
            }
        }

        async function performSave(name, silent = false) {
            if (!name) return;
            const workspaces = getWorkspaces();
            const data = editorToJSON();
            workspaces[name] = data;
            localStorage.setItem('rete-workspaces', JSON.stringify(workspaces));
            populateWorkspacesDropdown();
            if (!silent) {
                showMessage(`Workspace "${name}" saved.`, 'success');
            } else {
                console.log(`Auto-saved workspace: ${name}`);
            }
        }

        async function saveWorkspace() {
            const name = document.getElementById('workspaceName').value;
            if (!name) {
                showMessage('Please enter a name for the workspace.', 'error');
                return;
            }

            let name = document.getElementById('workspaceName').value;
            if (!name) {
                name = 'Workspace-' + Math.random().toString(36).substring(2, 7).toUpperCase();
                document.getElementById('workspaceName').value = name;

        async function loadWorkspace() {
            const name = document.getElementById('workspaceSelector').value;
            if (!name) {
                showMessage('Please select a workspace to load.', 'error');
                return;
            }
            const workspaces = getWorkspaces();
            let data = workspaces[name];
            if (!data) {
                showMessage(`Workspace "${name}" not found.`, 'error');
                return;
            }

            if (isWorkspaceOutdated(data)) {
                showMessage('Workspace is outdated and will be migrated.', 'info');
                data = migrateV1ToV2(data);
                saveWorkspace();
            }

            const wasAudioRunning = audioContext && audioContext.state === 'running';
            if (wasAudioRunning) {
                await stopAudio();
            }

            await editorFromJSON(data);

            if (wasAudioRunning) {
                await startAudio();
            }

            document.getElementById('workspaceName').value = name;
            showMessage(`Workspace "${name}" loaded.`, 'success');
        }

        function deleteWorkspace() {
            const name = document.getElementById('workspaceSelector').value;
            if (!name) {
                showMessage('Please select a workspace to delete.', 'error');
                return;
            }
            const workspaces = getWorkspaces();
            delete workspaces[name];
            localStorage.setItem('rete-workspaces', JSON.stringify(workspaces));
            populateWorkspacesDropdown();
            showMessage(`Workspace "${name}" deleted.`, 'success');
        }

        function exportWorkspace() {
            const data = editorToJSON();
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'workspace.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function importWorkspace(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    let data = JSON.parse(e.target.result);

                    if (isWorkspaceOutdated(data)) {
                        showMessage('Imported workspace is outdated and will be migrated.', 'info');
                        data = migrateV1ToV2(data);
                    }

                    const wasAudioRunning = audioContext && audioContext.state === 'running';
                    if (wasAudioRunning) await stopAudio();
                    
                    await editorFromJSON(data);

                    if (wasAudioRunning) await startAudio();

                    const fileName = file.name.split('.').slice(0, -1).join('.');
                    document.getElementById('workspaceName').value = fileName;
                    showMessage('Workspace imported successfully.', 'success');
                } catch (error) {
                    showMessage('Error importing workspace: ' + error.message, 'error');
                }
            };
            reader.readAsText(file);
        }

        async function startAudio() {
            if (!audioContext || audioContext.state === 'closed') {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                window.audioContext = audioContext;
            }

            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            masterGain = audioContext.createGain();
            window.masterGain = masterGain;

            analyser = audioContext.createAnalyser();
            window.analyser = analyser;
            analyser.fftSize = 2048;
            masterGain.connect(analyser);
            masterGain.connect(audioContext.destination);

            mediaStreamDestination = audioContext.createMediaStreamDestination();
            window.mediaStreamDestination = mediaStreamDestination;
            masterGain.connect(mediaStreamDestination);
         
            clearEditorBtn.disabled = false;
        
            // Initialize/start audio nodes that are already in the editor
            for (const node of editor.getNodes()) {
                let audioNode = audioNodes.get(node.id);

                if (!audioNode) {
                    if (typeof node.build === 'function') {
                        audioNode = node.build();
                    }

                    if (audioNode) {
                        audioNodes.set(node.id, audioNode);
                    }
                }

                node.start();
            }
            updateAudioGraphConnections();
        }

        function stopAll() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                recordBtn.textContent = '⏺️ Record';
                recordBtn.disabled = false;
                showMessage('Recording stopped.', 'info');
            } else if (loopSource) {
                stopPlaybackAndResetUI();
            }

            stopAudio();
        }

        async function playRecording() {
            if (recordedMediaUrl) {
                if (!audioContext || audioContext.state === 'closed' || audioContext.state === 'suspended') {
                    await startAudio();
                }

                if (audioContext && audioContext.state === 'running') {
                    if (loopSource) {
                        loopSource.stop();
                    }
                    try {
                        const response = await fetch(recordedMediaUrl);
                        const arrayBuffer = await response.arrayBuffer();
                        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

                        loopSource = audioContext.createBufferSource();
                        loopSource.buffer = audioBuffer;
                        loopSource.loop = true;
                        loopSource.connect(audioContext.destination);
                        loopSource.start(0);

                        playStopBtn.textContent = '⏹️';
                        audioState = 'playing';
                        showMessage('Playing recording.', 'info');
                    } catch (e) {
                        console.error('Error playing recording:', e);
                        showMessage('Error playing recording.', 'error');
                    }
                } else {
                    showMessage('Could not start audio context. Cannot play recording.', 'error');
                }
            }
        }


        function stopPlaybackAndResetUI() {
            if (loopSource) {

                const node = editor.getNode(id);

                }
                
                try {

            window.addEventListener('resize', resizeCanvas);

            function initWebGL() {
                gl = visualizerCanvas.getContext('webgl');
                if (!gl) {
                    console.error('WebGL not supported');
                    return;
                }

                resizeCanvas();

                const vertexShaderSource = document.getElementById('vertex-shader').text;
                const fragmentShaderSource = document.getElementById('fragment-shader').text;

                const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
                const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);

                shaderProgram = createProgram(gl, vertexShader, fragmentShader);

                const positionAttributeLocation = gl.getAttribLocation(shaderProgram, 'a_position');
                positionBuffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
                const positions = [-1, -1, 1, -1, -1, 1, 1, 1];
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);

                gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
                gl.clearColor(0, 0, 0, 0);
                gl.clear(gl.COLOR_BUFFER_BIT);

                gl.useProgram(shaderProgram);
                gl.enableVertexAttribArray(positionAttributeLocation);
                gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
                gl.vertexAttribPointer(positionAttributeLocation, 2, gl.FLOAT, false, 0, 0);

                uTime = gl.getUniformLocation(shaderProgram, 'u_time');
                uGlitchSeed = gl.getUniformLocation(shaderProgram, 'u_glitch_seed');
                uResolution = gl.getUniformLocation(shaderProgram, 'u_resolution');
                uFrequencyData = gl.getUniformLocation(shaderProgram, 'u_frequency_data');

                frequencyDataTexture = gl.createTexture();
                gl.bindTexture(gl.TEXTURE_2D, frequencyDataTexture);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
            }

            function createShader(gl, type, source) {
                const shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);
                const success = gl.getShaderParameter(shader, gl.COMPILE_STATUS);
                if (success) {
                    return shader;
                }
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
            }

            function createProgram(gl, vertexShader, fragmentShader) {
                const program = gl.createProgram();
                gl.attachShader(program, vertexShader);
                gl.attachShader(program, fragmentShader);
                gl.linkProgram(program);
                const success = gl.getProgramParameter(program, gl.LINK_STATUS);
                if (success) {
                    return program;
                }
                console.error(gl.getProgramInfoLog(program));
                gl.deleteProgram(program);
            }

            function visualize() {
                const isRecording = mediaRecorder && mediaRecorder.state === 'recording';
                const isActive = visualizerView.classList.contains('active');

                if (!isActive && !isRecording) {
                    isAnimating = false;
                    return;
                }

                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                analyser.getByteFrequencyData(dataArray);

                gl.uniform1f(uTime, performance.now() / 1000);
                gl.uniform1f(uGlitchSeed, glitchSeed);
                gl.uniform2f(uResolution, gl.canvas.width, gl.canvas.height);

                gl.bindTexture(gl.TEXTURE_2D, frequencyDataTexture);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.LUMINANCE, bufferLength, 1, 0, gl.LUMINANCE, gl.UNSIGNED_BYTE, dataArray);
                gl.uniform1i(uFrequencyData, 0);

                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

                requestAnimationFrame(visualize);
            }

            workspaceTab.addEventListener('click', () => {
                workspaceView.classList.add('active');
                visualizerView.classList.remove('active');
                workspaceTab.classList.replace('button-secondary', 'button-primary');
                visualizerTab.classList.replace('button-primary', 'button-secondary');
            });

            visualizerTab.addEventListener('click', () => {
                workspaceView.classList.remove('active');
                visualizerView.classList.add('active');
                visualizerTab.classList.replace('button-secondary', 'button-primary');
                workspaceTab.classList.replace('button-primary', 'button-secondary');

                if (!gl) {
                    initWebGL();
                }
                if (!isAnimating) {
                    isAnimating = true;
                    visualize();
                }
            });
        };
    </script>
<script id="vertex-shader" type="x-shader/x-vertex">
    // Set precision for the vertex shader to match the fragment shader
    precision mediump float;

    attribute vec4 a_position;
    uniform float u_time;
    uniform float u_glitch_seed;
    
    float randV(float n){ return fract(sin(n) * 43758.5453123); }

    void main() {
        vec4 pos = a_position;
        
        // Occasional full-screen "jump"
        if(randV(u_time * u_glitch_seed) > 0.98) {
            pos.x += (randV(u_time) - 0.5) * 0.1;
            pos.y += (randV(u_time + 1.0) - 0.5) * 0.1;
        }
        
        gl_Position = pos;
    }
</script>

<script id="fragment-shader" type="x-shader/x-fragment">
    precision mediump float;
    
    uniform float u_time;
    uniform float u_glitch_seed;
    uniform sampler2D u_frequency_data;
    uniform vec2 u_resolution;

    float rand(vec2 co){
        return fract(sin(dot(co.xy + u_glitch_seed, vec2(12.9898, 78.233))) * 43758.5453);
    }

    void main() {
        // --- 1. COORDINATE CRUSH ---
        // Quantize UVs based on bass to create a "bit-crushed" pixel look
        float bass_raw = texture2D(u_frequency_data, vec2(0.05, 0.0)).r;
        float quantize = 512.0 - (bass_raw * 480.0);
        vec2 uv = floor(gl_FragCoord.xy / u_resolution.xy * quantize) / quantize;

        // Audio analysis
        float mid = texture2D(u_frequency_data, vec2(0.3, 0.0)).r;
        float high = texture2D(u_frequency_data, vec2(0.7, 0.0)).r;
        float vol = (bass_raw + mid + high) / 3.0;

        // --- 2. MULTI-LAYER DATA CORRUPTION ---
        vec2 block_uv = uv;
        
        // Large scale displacement
        vec2 l_block = floor(uv * 6.0) / 6.0;
        if (rand(l_block + floor(u_time * 12.0)) < 0.2 * bass_raw) {
            block_uv += (rand(l_block) - 0.5) * 0.3;
        }

        // Horizontal "Analog Tearing" strips
        float strip_y = floor(uv.y * 40.0);
        if (rand(vec2(strip_y, floor(u_time * 20.0))) > 0.9) {
            block_uv.x += (rand(vec2(u_time)) - 0.5) * 0.4 * high;
        }

        // --- 3. COLOR & CHROMATIC ABERRATION ---
        // Intense RGB splitting on transients
        float shift = 0.08 * mid * rand(vec2(floor(u_time * 15.0)));
        
        float r = texture2D(u_frequency_data, vec2(fract(block_uv.x + shift), 0.0)).r;
        float g = texture2D(u_frequency_data, vec2(block_uv.x, 0.0)).r;
        float b = texture2D(u_frequency_data, vec2(fract(block_uv.x - shift), 0.0)).r;
        
        vec3 color = vec3(r, g, b);

        // --- 4. ARTIFACTING & NOISE ---
        // Data-moshing bars
        float bar_idx = floor(block_uv.x * 32.0);
        float bar_freq = texture2D(u_frequency_data, vec2(bar_idx / 32.0, 0.0)).r;
        if (block_uv.y < bar_freq) {
            color += vec3(0.0, 0.5, 1.0) * mid;
        }

        // Digital grain (static)
        color += (rand(block_uv + fract(u_time)) - 0.5) * (0.3 + high);

        // Inversion Flash
        if (high > 0.93 && rand(vec2(u_time)) > 0.5) {
            color = 1.0 - color;
        }

        gl_FragColor = vec4(clamp(color, 0.0, 1.0), 1.0);
    }
</script>
