        // --- New Arpeggiator Node ---
        // Internal class to manage the Web Audio API aspects of the Arpeggiator
        class Arpeggiator {
            constructor(audioContext, reteNodeId, data) {
                this.audioContext = audioContext;
                this.reteNodeId = reteNodeId;
                this.data = data; // Reference to the Rete.js node's data
                this.started = false;
                this.timeoutId = null;
                this.currentNoteIndex = 0;
                this.nextStepTime = 0;
                this.oscillators = [];
                this.gainNodes = [];
                this.midiListeners = [];
                this.tickListeners = [];
                this.tickCount = 0;

                // Master gain for the Arpeggiator output
                this.mainOutput = this.audioContext.createGain();
                this.mainOutput.gain.value = 0.5; // Default volume for arpeggiator

                this.setupNotesAndChords();
            }

            receiveMidiNotes(notes) {
                if (notes && notes.length > 0) {
                    const firstNote = notes[0];
                    // Find the note name from the MIDI value
                    let closestNoteName = 'C4';
                    let minDiff = Infinity;
                    for (const noteName in this.rootNotes) {
                        const diff = Math.abs(this.rootNotes[noteName] - firstNote);
                        if (diff < minDiff) {
                            minDiff = diff;
                            closestNoteName = noteName;
                        }
                    }

                    // Update the internal data and the audio output
                    this.updateParameter('rootNote', closestNoteName);

                    // Also update the UI control in the Rete node
                    const reteNode = editor.getNode(this.reteNodeId);
                    if (reteNode && reteNode.controls.rootNote) {
                        reteNode.controls.rootNote.value = closestNoteName;
                        area.update('node', this.reteNodeId); // This is important to re-render the node's control
                    }
                }
            }

            addMidiListener(callback) {
                if (typeof callback === 'function' && !this.midiListeners.includes(callback)) {
                    this.midiListeners.push(callback);
                }
            }

            removeMidiListener(callback) {
                const index = this.midiListeners.indexOf(callback);
                if (index > -1) {
                    this.midiListeners.splice(index, 1);
                }
            }

            onTick(tickTime, tickDuration) {
                const noteDurationMap = { '1': 96, '1/2': 48, '1/4': 24, '1/8': 12, '1/16': 6, '1/32': 3, '1/64': 1.5, '1/128': 0.75 };
                const ticksPerStep = noteDurationMap[this.data.noteDuration] || 6;

                if (this.tickCount % ticksPerStep === 0) {
                    const notes = this.getArpeggioNotes();
                    if (notes.length > 0) {
                        const currentStep = notes[this.currentNoteIndex];
                        const stepDuration = tickDuration * ticksPerStep;

                        // Schedule the note to play. Play it slightly shorter than the full step duration for a staccato effect.
                        this.scheduleNote(currentStep, stepDuration * 0.9);

                        const midiNotesToBroadcast = Array.isArray(currentStep) ? currentStep : [currentStep];
                        if (this.midiListeners.length > 0) {
                            this.midiListeners.forEach(callback => callback(midiNotesToBroadcast));
                        }

                        this.currentNoteIndex = (this.currentNoteIndex + 1) % notes.length;
                    }
                }
                this.tickCount++;
            }

            setupNotesAndChords() {
                // Chord definitions: MIDI offsets from root
                this.chordTypes = CHORD_TYPES;

                // Root note MIDI numbers
                this.rootNotes = ROOT_NOTES;
            }

            getArpeggioNotes() {
                const rootMidi = this.rootNotes[this.data.rootNote] || 60; // Default to C4
                const chordOffsets = this.chordTypes[this.data.chordType] || this.chordTypes['Major Triad'];
                const octaveRange = this.data.octaveRange || 1; // Number of octaves to span
                const arpeggioNotes = [];

                for (let oct = 0; oct < octaveRange; oct++) {
                    chordOffsets.forEach(offset => {
                        arpeggioNotes.push(rootMidi + offset + (oct * 12));
                    });
                }

                // First, ensure the base set of notes is sorted in ascending order.
                // This is crucial for 'Converge' and 'Diverge' to work correctly.
                const sortedNotes = [...arpeggioNotes].sort((a, b) => a - b);
                let patternResult = []; // This will hold the sequence of notes for the arpeggio

                switch (this.data.arpeggioPattern) {
                    case 'Down':
                        patternResult = [...sortedNotes].reverse();
                        break;

                    case 'Up-Down':
                        // Plays notes up, then down without repeating the highest/lowest notes
                        const reversedUpdown = [...sortedNotes].reverse();
                        patternResult = sortedNotes.concat(reversedUpdown.slice(1, -1));
                        break;

                    case 'Down-Up':
                        const reversedDownUp = [...sortedNotes].reverse();
                        patternResult = reversedDownUp.concat(sortedNotes.slice(1, -1));
                        break;

                    case 'Converge':
                        // Starts from the lowest and highest notes, moving towards the middle
                        let lowIdxConverge = 0;
                        let highIdxConverge = sortedNotes.length - 1;
                        while (lowIdxConverge <= highIdxConverge) {
                            if (lowIdxConverge === highIdxConverge) {
                                patternResult.push(sortedNotes[lowIdxConverge]);
                            } else {
                                patternResult.push(sortedNotes[lowIdxConverge]);
                                patternResult.push(sortedNotes[highIdxConverge]);
                            }
                            lowIdxConverge++;
                            highIdxConverge--;
                        }
                        break;

                    case 'Diverge':
                        // Starts from the middle notes, moving outwards towards the lowest and highest
                        const lenDiverge = sortedNotes.length;
                        let midLowIdxDiverge = Math.floor((lenDiverge - 1) / 2);
                        let midHighIdxDiverge = Math.ceil((lenDiverge - 1) / 2);

                        // If odd number of notes, the single middle note plays first
                        if (lenDiverge % 2 !== 0) {
                            patternResult.push(sortedNotes[midLowIdxDiverge]);
                            midLowIdxDiverge--;
                            midHighIdxDiverge++;
                        }

                        // Now, add notes outwards from the middle
                        while (midLowIdxDiverge >= 0 && midHighIdxDiverge < lenDiverge) {
                            patternResult.push(sortedNotes[midLowIdxDiverge]);
                            patternResult.push(sortedNotes[midHighIdxDiverge]);
                            midLowIdxDiverge--;
                            midHighIdxDiverge++;
                        }
                        break;

                    case 'Random':
                        // Shuffles the notes into a random order
                        patternResult = [...sortedNotes]; // Create a copy to shuffle
                        for (let i = patternResult.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            [patternResult[i], patternResult[j]] = [patternResult[j], patternResult[i]]; // Swap
                        }
                        break;

                    case 'Alberti Bass':
                        if (sortedNotes.length >= 3) {
                            // 1-5-3-5 pattern from the chord's notes
                            const root = sortedNotes[0];
                            const third = sortedNotes[1];
                            const fifth = sortedNotes[2];
                            patternResult = [root, fifth, third, fifth];
                        } else {
                            // Fallback for chords with less than 3 notes
                            patternResult = sortedNotes;
                        }
                        break;

                    case 'Chord':
                        // This will be a single step in the sequence, containing all notes
                        patternResult = [sortedNotes];
                        break;

                    case 'Melodic':
                        // A common "melodic" pattern is to go up, then come back down partway, or a zig-zag.
                        // Here's one interpretation: Play ascending, then descend from the second highest note down to the lowest.
                        if (sortedNotes.length === 0) {
                            patternResult = [];
                        } else if (sortedNotes.length === 1) {
                            patternResult = [...sortedNotes];
                        } else {
                            // Ascending part
                            patternResult = [...sortedNotes];

                            // Descending part from the second highest note down to the lowest
                            for (let i = sortedNotes.length - 2; i >= 0; i--) {
                                patternResult.push(sortedNotes[i]);
                            }
                        }
                        // Example: [C, E, G, C'] -> [C, E, G, C', G, E, C]
                        break;

                    default: // 'Up' pattern
                        patternResult = sortedNotes;
                        break;
                }

                return patternResult;
            }

            scheduleNote(midiNotes, durationSeconds) {
                if (!this.audioContext) return;

                const notesToPlay = Array.isArray(midiNotes) ? midiNotes : [midiNotes];
                notesToPlay.forEach(midiNote => {
                    const frequency = midiToFrequency(midiNote);
                    const osc = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();

                    osc.type = this.data.waveform || 'sine';
                    osc.frequency.setValueAtTime(frequency, this.audioContext.currentTime);

                    const adsrData = {
                        attack: this.data.attack,
                        decay: this.data.decay,
                        sustain: this.data.sustain,
                        release: this.data.release
                    };
                    applyADSR(gainNode, adsrData, durationSeconds, this.audioContext, 0.3 / notesToPlay.length);

                    osc.connect(gainNode);
                    gainNode.connect(this.mainOutput);
                    osc.start(this.audioContext.currentTime);
                    osc.stop(this.audioContext.currentTime + durationSeconds);

                    osc.onended = () => {
                        osc.disconnect();
                        gainNode.disconnect();
                    };
                });
            }

            start() {
                if (this.started || !this.audioContext) return;
                this.started = true;
                this.currentNoteIndex = 0;
                this.nextStepTime = this.audioContext.currentTime;
                this.schedule();
            }

            schedule() {
                if (!this.started) return;

                const hasClockConnection = editor.getConnections().some(conn => conn.target === this.reteNodeId && conn.targetInput === 'clock');
                if (hasClockConnection) {
                    // In external clock mode, the onTick method will handle scheduling.
                    // This loop just needs to keep running to take over if the clock is disconnected.
                    this.timeoutId = setTimeout(() => this.schedule(), 100); // Check for clock disconnection periodically
                    return;
                }

                const notes = this.getArpeggioNotes();
                if (notes.length === 0) {
                    this.stop();
                    return;
                }

                const bpm = this.data.bpm || 120;
                const noteDurationMap = { '1': 4, '1/2': 2, '1/4': 1, '1/8': 0.5, '1/16': 0.25, '1/32': 0.125, '1/64': 0.0625, '1/128': 0.03125 };
                const noteValue = noteDurationMap[this.data.noteDuration] || 0.25;
                const secondsPerBeat = 60.0 / bpm;
                const stepDuration = secondsPerBeat * noteValue;

                while (this.nextStepTime < this.audioContext.currentTime + 0.1) {
                    const midiNote = notes[this.currentNoteIndex];
                    this.scheduleNote(midiNote, stepDuration);

                    if (this.midiListeners.length > 0) {
                        const midiNotesToBroadcast = Array.isArray(midiNote) ? midiNote : [midiNote];
                        this.midiListeners.forEach(callback => callback(midiNotesToBroadcast));
                    }

                    this.nextStepTime += stepDuration;
                    this.currentNoteIndex = (this.currentNoteIndex + 1) % notes.length;
                }
                this.timeoutId = setTimeout(() => this.schedule(), 25);
            }

            stop() {
                if (!this.started) return;
                clearTimeout(this.timeoutId);
                this.timeoutId = null;
                this.started = false;
                console.log('Arpeggiator stopped.');
            }

            updateParameter(param, value) {
                this.data[param] = value;
                if (this.started) {
                    // Restart arpeggiator to apply new tempo/notes/pattern
                    this.stop();
                    this.start();
                }
            }
        }

        // --- New Sequencer Node ---
        // Internal class to manage the Web Audio API aspects of the Sequencer
        class Sequencer {
            constructor(audioContext, reteNodeId, data) {
                this.audioContext = audioContext;
                this.reteNodeId = reteNodeId;
                this.data = data; // Reference to the Rete.js node's data
                this.started = false;
                this.timeoutId = null;
                this.currentStep = 0;
                this.nextStepTime = 0;
                this.tickCount = 0;
                this.sequenceEvents = null;
                this.midiListeners = [];

                // Master gain for the Sequencer output
                this.mainOutput = this.audioContext.createGain();
                this.mainOutput.gain.value = 0.5; // Default volume for sequencer

                this.setupNotes();
            }

            addMidiListener(callback) {
                if (typeof callback === 'function' && !this.midiListeners.includes(callback)) {
                    this.midiListeners.push(callback);
                }
            }

            removeMidiListener(callback) {
                const index = this.midiListeners.indexOf(callback);
                if (index > -1) {
                    this.midiListeners.splice(index, 1);
                }
            }

            onTick(tickTime, tickDuration) {
                // The note duration control on the UI will determine how many ticks pass before the next step is triggered.
                const noteDurationMap = { '1': 96, '1/2': 48, '1/4': 24, '1/8': 12, '1/16': 6, '1/32': 3, '1/64': 1.5, '1/128': 0.75 };
                const ticksPerStep = noteDurationMap[this.data.noteDuration] || 6;

                if (this.tickCount % ticksPerStep === 0) {
                    if (!this.sequenceEvents) {
                         this.sequenceEvents = this.parseSequence();
                    }
                    if (!this.sequenceEvents || this.sequenceEvents.length === 0) return;

                    const event = this.sequenceEvents[this.currentStep];
                    if (!event) {
                         this.currentStep = (this.currentStep + 1) % this.sequenceEvents.length;
                        return;
                    }

                    // For external clock, we ignore the sequence's own timing modifiers and just use the UI control.
                    // The note duration is one step long.
                    const stepDuration = tickDuration * ticksPerStep;

                    const midiNotesToBroadcast = [];
                     if (Array.isArray(event)) {
                        for (const note of event) {
                            if (note.midi !== null) {
                                this.scheduleNote(note.midi, stepDuration * 0.9);
                                midiNotesToBroadcast.push(note.midi);
                            }
                        }
                    } else {
                        if (event.midi !== null) {
                            this.scheduleNote(event.midi, stepDuration * 0.9);
                            midiNotesToBroadcast.push(event.midi);
                        }
                    }

                    if (this.midiListeners.length > 0 && midiNotesToBroadcast.length > 0) {
                        this.midiListeners.forEach(callback => callback(midiNotesToBroadcast));
                    }

                    this.currentStep = (this.currentStep + 1) % this.sequenceEvents.length;
                }

                this.tickCount++;
            }

            setupNotes() {
                // Root note MIDI numbers
                this.rootNotes = ROOT_NOTES;
            }

            parseSequence() {
                const sequence = this.data.sequence || 'C4';
                const tokens = sequence
                    .replace(/([\[\(\{])/g, ' $1 ') // Openers
                    .replace(/([\]\)\}](?:[:*\/]\d*|<|\?)*)/g, ' $1 ') // Closers with modifiers
                    .split(/\s+/)
                    .filter(s => s.length > 0);
                return this.buildStructure(tokens);
            }

            generateEuclidean(pulses, steps) {
                if (pulses > steps || pulses < 0 || steps <= 0) return Array(steps).fill(0);
                const pattern = [];
                for (let i = 0; i < steps; i++) {
                    // This generates a well-distributed pattern
                    pattern.push(Math.floor(i * pulses / steps) !== Math.floor((i - 1) * pulses / steps) ? 1 : 0);
                }
                return pattern;
            }

            buildStructure(tokens) {
                const structure = [];
                const openers = ['[', '(', '{'];
                const closers = [']', ')', '}'];

                while (tokens.length > 0) {
                    const token = tokens.shift();
                    const euclideanMatch = token.match(/^([A-G#?0-9~_@]+)\*(\d+)\/(\d+)$/);
                    if (euclideanMatch) {
                        const note = euclideanMatch[1];
                        const pulses = parseInt(euclideanMatch[2], 10);
                        const steps = parseInt(euclideanMatch[3], 10);

                        if (steps > 0) {
                            const pattern = this.generateEuclidean(pulses, steps);
                            const speedModifier = `/${steps}`;
                            const generatedTokens = pattern.map(p => (p === 1 ? note : '~') + speedModifier);
                            tokens.unshift(...generatedTokens);
                            continue;
                        }
                    }

                    if (openers.includes(token)) {
                        structure.push(this.buildStructure(tokens));
                    } else if (closers.includes(token[0])) {
                        const modifierString = token.substring(1);
                        return this.applyGroupModifiers(structure, modifierString);
                    } else {
                        structure.push(token);
                    }
                }
                return this.flattenAndProcess(structure);
            }

            applyGroupModifiers(group, modifiers) {
                let modifiedGroup = [...group];

                // Polymetric Tuplets (e.g., :3 for triplets)
                const tupletMatch = modifiers.match(/:(\d+)/);
                if (tupletMatch) {
                    const tupletValue = parseInt(tupletMatch[1], 10);
                    if (tupletValue > 0) {
                        const speedModifier = `*` + tupletValue;
                        modifiedGroup = this.applyModifierRecursively(modifiedGroup, speedModifier);
                    }
                }

                // Repetition (* operator)
                const repetitionMatch = modifiers.match(/\*(\d+)/);
                if (repetitionMatch) {
                    const count = parseInt(repetitionMatch[1], 10);
                    const originalGroup = [...modifiedGroup];
                    if (count > 1) {
                        for (let i = 1; i < count; i++) {
                            modifiedGroup.push(...JSON.parse(JSON.stringify(originalGroup)));
                        }
                    } else if (count === 0) {
                        modifiedGroup = [];
                    }
                }

                // Reverse
                if (modifiers.includes('<')) {
                    modifiedGroup.reverse();
                }

                // Shuffle
                if (modifiers.includes('?')) {
                    for (let i = modifiedGroup.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [modifiedGroup[i], modifiedGroup[j]] = [modifiedGroup[j], modifiedGroup[i]];
                    }
                }

                // Speed/Subdivision (/ operator)
                const speedMatch = modifiers.match(/\/(\d+)/);
                if (speedMatch) {
                    const modifierToApply = `/` + speedMatch[1];
                    modifiedGroup = this.applyModifierRecursively(modifiedGroup, modifierToApply);
                }

                return modifiedGroup;
            }

            applyModifierRecursively(group, modifier) {
                return group.map(item => {
                    if (typeof item === 'string') {
                        return item + modifier;
                    } else if (Array.isArray(item)) {
                        return this.applyModifierRecursively(item, modifier);
                    }
                    return item;
                });
            }

            flattenAndProcess(structure) {
                const flatList = [];
                for (const item of structure) {
                    if (Array.isArray(item)) {
                        // It's a chord/group, process each note inside
                        const chord = item.map(noteString => this.parseNoteEvent(noteString));
                        flatList.push(chord);
                    } else {
                        // It's a single note
                        flatList.push(this.parseNoteEvent(item));
                    }
                }
                return flatList;
            }

            parseNoteEvent(eventString) {
                // Return a single note event object, similar to the old .map callback
                if (Array.isArray(eventString)) {
                    return eventString.map(s => this.parseNoteEvent(s));
                }
                let noteName = eventString.match(/[A-G]#?[0-9]/)?.[0] || (eventString.includes('~') ? '~' : null);
                    let speed = 1;
                    let duration = 1;
                    let elongation = 1;

                    // Speed multiplier/divider
                    const speedMatch = eventString.match(/[*\/]\d+/);
                    if (speedMatch) {
                        const operator = speedMatch[0][0];
                        const value = parseInt(speedMatch[0].substring(1), 10);
                        if (operator === '*') {
                            speed *= value;
                        } else if (operator === '/') {
                            speed /= value;
                        }
                    }

                    // Duration weight
                    const durationMatch = eventString.match(/@\d+/);
                    if (durationMatch) {
                        duration = parseInt(durationMatch[0].substring(1), 10);
                    }

                    // Elongation
                    const elongationMatch = eventString.match(/_/);
                    if (elongationMatch) {
                        elongation = 1.5;
                    }

                    const midi = noteName === '~' ? null : (this.rootNotes[noteName] || null);

                    return {
                        midi: midi,
                        speed: speed,
                        duration: duration,
                        elongation: elongation,
                        noteName: noteName
                    };
            }

            scheduleNote(midiNote, durationSeconds) {
                if (!this.audioContext) return;

                const frequency = midiToFrequency(midiNote);
                const osc = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();

                osc.type = this.data.waveform || 'sine';
                osc.frequency.setValueAtTime(frequency, this.audioContext.currentTime);

                const adsrData = {
                    attack: this.data.attack,
                    decay: this.data.decay,
                    sustain: this.data.sustain,
                    release: this.data.release
                };
                applyADSR(gainNode, adsrData, durationSeconds, this.audioContext, 0.3);

                osc.connect(gainNode);
                gainNode.connect(this.mainOutput);

                osc.start(this.audioContext.currentTime);
                osc.stop(this.audioContext.currentTime + durationSeconds);

                osc.onended = () => {
                    osc.disconnect();
                    gainNode.disconnect();
                };
            }

            start() {
                if (this.started || !this.audioContext) return;
                this.started = true;
                this.currentStep = 0;
                this.sequenceEvents = this.parseSequence();
                this.nextStepTime = this.audioContext.currentTime;
                this.schedule();
            }

            schedule() {
                if (!this.started) return;

                const hasClockConnection = editor.getConnections().some(conn => conn.target === this.reteNodeId && conn.targetInput === 'clock');
                if (hasClockConnection) {
                    // In external clock mode, the onTick method will handle scheduling.
                    // This loop just needs to keep running to take over if the clock is disconnected.
                    this.timeoutId = setTimeout(() => this.schedule(), 100); // Check for clock disconnection periodically
                    return;
                }

                if (!this.sequenceEvents || this.sequenceEvents.length === 0) {
                    this.stop();
                    return;
                }

                while (this.nextStepTime < this.audioContext.currentTime + 0.1) {
                    const event = this.sequenceEvents[this.currentStep];
                    const representativeEvent = Array.isArray(event) ? event[0] : event;

                    if (!representativeEvent) {
                        this.currentStep = (this.currentStep + 1) % this.sequenceEvents.length;
                        continue; // Skip to the next iteration of the while loop
                    }

                    const bpm = this.data.bpm || 120;
                    const noteDurationMap = { '1': 1, '1/2': 0.5, '1/4': 0.25, '1/8': 0.125, '1/16': 0.0625, '1/32': 0.03125, '1/64': 0.015625, '1/128': 0.0078125 };
                    const baseNoteDuration = noteDurationMap[this.data.noteDuration] || 0.25;
                    const secondsPerBeat = 60.0 / bpm;
                    const stepDuration = secondsPerBeat * 4 * baseNoteDuration * (1 / representativeEvent.speed) * representativeEvent.duration;
                    const midiNotesToBroadcast = [];

                    if (Array.isArray(event)) {
                        for (const note of event) {
                            if (note.midi !== null) {
                                this.scheduleNote(note.midi, stepDuration * note.elongation);
                                midiNotesToBroadcast.push(note.midi);
                            }
                        }
                    } else {
                        if (event.midi !== null) {
                             this.scheduleNote(event.midi, stepDuration * event.elongation);
                             midiNotesToBroadcast.push(event.midi);
                        }
                    }

                    if (this.midiListeners.length > 0 && midiNotesToBroadcast.length > 0) {
                        this.midiListeners.forEach(callback => callback(midiNotesToBroadcast));
                    }

                    this.nextStepTime += stepDuration;
                    this.currentStep = (this.currentStep + 1) % this.sequenceEvents.length;
                }

                this.timeoutId = setTimeout(() => this.schedule(), 25);
            }

            stop() {
                if (!this.started) return;
                clearTimeout(this.timeoutId);
                this.timeoutId = null;
                this.started = false;
                console.log('Sequencer stopped.');
            }

            // Method to update parameters dynamically (called from Rete.js control changes)
            updateParameter(param, value) {
                this.data[param] = value;
                if (this.started) {
                    // Restart sequencer to apply new tempo/notes
                    this.stop();
                    this.start();
                }
            }
        }

        // --- New Master Clock Node ---
        class MasterClock {
            constructor(audioContext, reteNodeId, data) {
                this.audioContext = audioContext;
                this.reteNodeId = reteNodeId;
                this.data = data;
                this.started = false;
                this.stopping = false;
                this.tickListeners = [];
                this.timeoutId = null;
                this.nextStepTime = 0;
                this.beatCount = 0;
            }

            addTickListener(callback) {
                if (typeof callback === 'function' && !this.tickListeners.includes(callback)) {
                    this.tickListeners.push(callback);
                }
            }

            removeTickListener(callback) {
                const index = this.tickListeners.indexOf(callback);
                if (index > -1) {
                    this.tickListeners.splice(index, 1);
                }
            }

            start() {
                if (this.started || !this.audioContext) return;
                this.started = true;
                this.stopping = false;
                this.beatCount = 0; // Reset beat count on start
                this.nextStepTime = this.audioContext.currentTime;
                this.schedule();
            }

            stop() {
                if (!this.started || this.stopping) return;
                this.stopping = true;
            }

            _internalStop() {
                clearTimeout(this.timeoutId);
                this.timeoutId = null;
                this.started = false;
                this.stopping = false;

                // Update the UI toggle control to reflect the stopped state
                const reteNode = editor.getNode(this.reteNodeId);
                if (reteNode && reteNode.controls.running) {
                    reteNode.controls.running.value = false;
                    reteNode.data.running = false;
                    area.update('node', this.reteNodeId);
                }
            }

            schedule() {
                if (!this.started) return;

                const bpm = this.data.bpm || 120;
                const ppqn = 24; // Pulses per quarter note
                const ticksPerMeasure = ppqn * 4; // Assuming 4/4 time
                const secondsPerBeat = 60.0 / bpm;
                const tickDuration = secondsPerBeat / ppqn;

                while (this.nextStepTime < this.audioContext.currentTime + 0.1) {
                    if (this.stopping && this.beatCount % ticksPerMeasure === 0) {
                        this._internalStop();
                        return;
                    }

                    // The MasterClockNode will now handle its own visual updates.
                    // This MasterClock class is only responsible for the audio-rate scheduling.
                    this.tickListeners.forEach(listener => listener(this.nextStepTime, tickDuration));
                    this.nextStepTime += tickDuration;
                    this.beatCount++;
                }

                this.timeoutId = setTimeout(() => this.schedule(), 25);
            }

            updateParameter(param, value) {
                this.data[param] = value;
                // No need to restart, the new BPM will be picked up on the next schedule call
            }
        }

        // LFO (Low-Frequency Oscillator) Class
        class LFOGenerator {
            constructor(audioContext, reteNodeId, data) {
                this.audioContext = audioContext;
                this.reteNodeId = reteNodeId;
                this.data = data;
                this.started = false;

                this.oscillator = this.audioContext.createOscillator();
                this.mainOutput = this.audioContext.createGain(); // Output for modulation or audible signal
                this.mainOutput.gain.value = this.data.amount || 0.5; // Modulation amount / amplitude

                this.oscillator.connect(this.mainOutput);

                this.updateParameter('frequency', this.data.frequency || 5, false);
                this.updateParameter('waveform', this.data.waveform || 'sine', false);
                this.updateParameter('amount', this.data.amount || 0.5, false); // Initialize amount
            }

            start() {
                if (this.started) return;
                try {
                    this.oscillator.start(0);
                    this.started = true;
                    console.log(`LFO ${this.reteNodeId} started.`);
                } catch (e) {
                    console.warn(`Could not start LFO ${this.reteNodeId}:`, e);
                }
            }

            stop() {
                if (!this.started) return;
                try {
                    this.oscillator.stop(0);
                    this.oscillator.disconnect();
                    this.mainOutput.disconnect();
                    // Recreate oscillator if it needs to be started again later
                    this.oscillator = this.audioContext.createOscillator();
                    this.oscillator.connect(this.mainOutput);
                    this.oscillator.type = this.data.waveform;
                    this.oscillator.frequency.value = this.data.frequency;
                    
                    this.started = false;
                    console.log(`LFO ${this.reteNodeId} stopped.`);
                } catch (e) {
                    console.warn(`Could not stop LFO ${this.reteNodeId}:`, e);
                }
            }

            updateParameter(paramName, value) {
                this.data[paramName] = value;
                if (paramName === 'frequency' && this.oscillator) {
                    this.oscillator.frequency.value = value;
                } else if (paramName === 'waveform' && this.oscillator) {
                    this.oscillator.type = value;
                } else if (paramName === 'amount' && this.mainOutput) {
                    this.mainOutput.gain.value = value;
                }
                // If LFO is running and waveform type changes, it needs to be stopped and restarted
                if (paramName === 'waveform' && this.started) {
                    this.stop();
                    this.start();
                }
            }
        }

        // ADSR Envelope Class
        class ADSREnvelope {
            constructor(audioContext, reteNodeId, data) {
                this.audioContext = audioContext;
                this.reteNodeId = reteNodeId;
                this.data = data;
                this.gateOpen = false;
                this.isLooping = false;
                this.timeoutId = null;
                this.nextCycleTime = 0;

                this.internalSource = this.audioContext.createConstantSource();
                this.internalSource.offset.value = 1.0;
                this.mainOutput = this.audioContext.createGain();
                this.mainOutput.gain.value = 0;
                this.internalSource.connect(this.mainOutput);
                this.internalSource.start();

                // Initialize parameters
                this.updateParameter('mode', this.data.mode || 'EG');
                this.updateParameter('attack', this.data.attack || 0.1);
                this.updateParameter('decay', this.data.decay || 0.1);
                this.updateParameter('sustain', this.data.sustain || 0.5);
                this.updateParameter('release', this.data.release || 0.2);
            }

            handleGate(isGateHigh) {
                if (this.data.mode === 'LFO') return;

                if (isGateHigh && !this.gateOpen) {
                    this.gateOpen = true;
                    if (this.data.mode === 'EG') {
                        this.trigger();
                    } else if (this.data.mode === 'GATE') {
                        this.startLooping();
                    }
                } else if (!isGateHigh && this.gateOpen) {
                    this.gateOpen = false;
                    if (this.data.mode === 'EG') {
                        this.release();
                    } else if (this.data.mode === 'GATE') {
                        this.stopLooping();
                    }
                }
            }

            trigger() {
                const now = this.audioContext.currentTime;
                const gainParam = this.mainOutput.gain;
                const attackDuration = Math.max(0.001, this.data.attack);
                const decayDuration = Math.max(0.001, this.data.decay);
                const sustainLevel = this.data.sustain;

                gainParam.cancelScheduledValues(now);
                gainParam.setValueAtTime(gainParam.value, now);
                gainParam.linearRampToValueAtTime(1.0, now + attackDuration);
                gainParam.linearRampToValueAtTime(sustainLevel, now + attackDuration + decayDuration);
            }

            release() {
                const now = this.audioContext.currentTime;
                const gainParam = this.mainOutput.gain;
                const releaseDuration = Math.max(0.001, this.data.release);

                gainParam.cancelScheduledValues(now);
                gainParam.setValueAtTime(gainParam.value, now);
                gainParam.linearRampToValueAtTime(0, now + releaseDuration);
            }

            startLooping() {
                if (this.isLooping) return;
                this.isLooping = true;
                this.nextCycleTime = this.audioContext.currentTime;
                this.scheduleLoop();
            }

            stopLooping() {
                if (!this.isLooping) return;
                this.isLooping = false;
                if (this.timeoutId) clearTimeout(this.timeoutId);
                this.timeoutId = null;
                this.release();
            }

            scheduleLoop() {
                if (!this.isLooping) return;

                const gainParam = this.mainOutput.gain;
                const attackDuration = Math.max(0.001, this.data.attack);
                const decayDuration = Math.max(0.001, this.data.decay);
                const sustainLevel = this.data.sustain;
                const releaseDuration = Math.max(0.001, this.data.release);
                const cycleDuration = attackDuration + decayDuration + releaseDuration;

                while (this.nextCycleTime < this.audioContext.currentTime + 0.1) {
                    gainParam.setValueAtTime(0, this.nextCycleTime);
                    gainParam.linearRampToValueAtTime(1.0, this.nextCycleTime + attackDuration);
                    gainParam.linearRampToValueAtTime(sustainLevel, this.nextCycleTime + attackDuration + decayDuration);
                    gainParam.linearRampToValueAtTime(0, this.nextCycleTime + cycleDuration);
                    this.nextCycleTime += cycleDuration;
                }

                this.timeoutId = setTimeout(() => this.scheduleLoop(), 25);
            }

            stop() {
                if (this.isLooping) {
                    this.stopLooping();
                } else {
                    this.release();
                }
            }

            updateParameter(paramName, value) {
                this.data[paramName] = value;
                if (paramName === 'mode') {
                    this.stopLooping();
                    this.gateOpen = false;
                    if (value === 'LFO') {
                        this.startLooping();
                    }
                } else if (this.isLooping) {
                    const now = this.audioContext.currentTime;
                    this.mainOutput.gain.cancelScheduledValues(now);
                    this.nextCycleTime = now;
                }
            }
        }

        class Vocoder {
            constructor(audioContext, reteNodeId, data) {
                this.audioContext = audioContext;
                this.reteNodeId = reteNodeId;
                this.data = data;
                this.started = false;

                this.workletNode = new AudioWorkletNode(this.audioContext, 'vocoder-processor', {
                    numberOfInputs: 2,
                    numberOfOutputs: 1,
                    outputChannelCount: [1]
                });

                // --- Inputs ---
                this.carrierInput = this.audioContext.createGain();
                this.modulatorInput = this.audioContext.createGain();

                this.carrierInput.connect(this.workletNode, 0, 0);
                this.modulatorInput.connect(this.workletNode, 0, 1);

                // --- Internal Carrier ---
                this.internalCarrier = this.audioContext.createOscillator();
                this.internalCarrier.type = this.data.waveform || 'sawtooth';
                this.internalCarrier.frequency.value = this.data.frequency || 110;
                this.internalCarrier.connect(this.carrierInput);

                // --- Parameters ---
                this.numBands = this.workletNode.parameters.get('numBands');
                this.formantShift = this.workletNode.parameters.get('formantShift');
                this.unvoicedLevel = this.workletNode.parameters.get('unvoicedLevel');

                this.numBands.value = this.data.numBands || 16;
                this.formantShift.value = this.data.formantShift || 0;
                this.unvoicedLevel.value = this.data.unvoicedLevel || 0.5;

                // --- Output ---
                this.mainOutput = this.audioContext.createGain();
                this.workletNode.connect(this.mainOutput);
            }

            start() {
                if (this.started) return;
                try {
                    this.internalCarrier.start(0);
                    this.started = true;
                } catch (e) {
                    console.warn(`Could not start Vocoder components for node ${this.reteNodeId}:`, e);
                }
            }

            stop() {
                if (!this.started) return;
                try {
                    this.internalCarrier.stop(0);
                    this.internalCarrier = this.audioContext.createOscillator();
                    this.internalCarrier.type = this.data.waveform;
                    this.internalCarrier.frequency.value = this.data.frequency;
                    this.internalCarrier.connect(this.carrierInput);
                    this.started = false;
                } catch (e) {
                    console.warn(`Could not stop Vocoder components for node ${this.reteNodeId}:`, e);
                }
            }

            updateParameter(paramName, value) {
                this.data[paramName] = value;
                switch (paramName) {
                    case 'frequency':
                        this.internalCarrier.frequency.setTargetAtTime(value, this.audioContext.currentTime, 0.01);
                        break;
                    case 'waveform':
                        this.internalCarrier.type = value;
                        break;
                }
            }
        }

            constructor(audioContext, reteNodeId, data) {

        class Multiplayer {
            constructor() {
                this.peer = null;
                this.hostId = null;
                this.connections = new Map(); // key: peerId, value: DataConnection
                this.isHost = false;
                this.eventListeners = new Map();
                this._peerIdReady = false;
                this._pendingConnection = null;
            }

            // --- Public API ---

            initialize() {
                this.peer = new Peer();
                this.peer.on('open', this._handlePeerOpen.bind(this));
                this.peer.on('connection', this._handleConnection.bind(this));
                this.peer.on('error', this._handleError.bind(this));
            }

            startHosting() {
                this.isHost = true;
                this.hostId = this.getPeerId(); // The host's ID is their own peer ID
                console.log('Started hosting with ID:', this.hostId);
                this.emit('host-started', this.hostId);
            }

            connectTo(hostId) {
                if (!this._peerIdReady) {
                    this._pendingConnection = hostId;
                    console.log('Peer ID not ready, connection pending.');
                    return;
                }

                if (this.connections.has(hostId)) {
                    console.warn("Already connected to host:", hostId);
                    return;
                }

                console.log('Attempting to connect to host:', hostId);
                const conn = this.peer.connect(hostId, { reliable: true });
                this._setupConnection(conn);
                this.hostId = hostId;
                this.isHost = false;
            }

            disconnect() {
                console.log('Disconnecting from all peers.');
                for (const conn of this.connections.values()) {
                    conn.close();
                }
                this.connections.clear();
                this.isHost = false;
                this.hostId = null;
                this.emit('connections-updated', []);
                this.emit('disconnected');
            }

            broadcast(data) {
                if (this.isHost) {
                    this._broadcastToOthers(this.getPeerId(), data);
                } else if (this.hostId && this.connections.has(this.hostId)) {
                    this.connections.get(this.hostId).send(JSON.stringify(data));
                }
            }

            getPeerId() {
                return this.peer ? this.peer.id : null;
            }

            getConnectedPeers() {
                return Array.from(this.connections.keys());
            }

            isConnected() {
                return this.connections.size > 0 || this.isHost;
            }

            // --- Event Emitter ---

            on(eventName, listener) {
                if (!this.eventListeners.has(eventName)) {
                    this.eventListeners.set(eventName, []);
                }
                this.eventListeners.get(eventName).push(listener);
            }

            emit(eventName, ...args) {
                if (this.eventListeners.has(eventName)) {
                    this.eventListeners.get(eventName).forEach(listener => listener(...args));
                }
            }

            // --- Private Methods ---

            _handlePeerOpen(id) {
                console.log('My peer ID is: ' + id);
                this._peerIdReady = true;
                this.emit('peer-id-ready', id);

                if (this._pendingConnection) {
                    this.connectTo(this._pendingConnection);
                    this._pendingConnection = null;
                }
            }

            _handleConnection(conn) {
                this._setupConnection(conn);
            }

            _handleError(err) {
                console.error('PeerJS error:', err);
                this.emit('error', err);
            }

            _setupConnection(conn) {
                conn.on('open', () => this._handleOpen(conn));
                conn.on('data', (data) => this._handleData(conn, data));
                conn.on('close', () => this._handleClose(conn));
                conn.on('error', (err) => this._handleConnError(conn, err));
            }

            _handleOpen(conn) {
                console.log(`Connection opened with ${conn.peer}`);
                this.connections.set(conn.peer, conn);

                if (this.isHost) {
                    const workspaceData = editorToJSON();
                    this.sendInitialWorkspace(conn.peer, workspaceData);
                }
                this.emit('connection-opened', conn.peer);
                this.emit('connections-updated', Array.from(this.connections.values()));
            }

            _handleData(conn, data) {
                try {
                    const parsedData = JSON.parse(data);
                    if (this.isHost) {
                        this._broadcastToOthers(conn.peer, parsedData);
                    }
                    this.emit('data-received', parsedData);
                } catch (e) {
                    console.error("Failed to parse incoming data:", e);
                }
            }

            _handleClose(conn) {
                console.log(`Connection closed with ${conn.peer}`);
                this.connections.delete(conn.peer);
                this.emit('connection-closed', conn.peer);
                this.emit('connections-updated', Array.from(this.connections.values()));

                if (conn.peer === this.hostId && !this.isHost) {
                    this.disconnect(); // Host disconnected, end session
                }
            }

            _handleConnError(conn, err) {
                console.error(`Connection error with ${conn.peer}:`, err);
                this.emit('error', err);
            }

            sendInitialWorkspace(peerId, data) {
                if (this.connections.has(peerId)) {
                    this.connections.get(peerId).send(JSON.stringify(data));
                }
            }

            _broadcastToOthers(senderId, data) {
                const payload = JSON.stringify(data);
                for (const [peerId, conn] of this.connections.entries()) {
                    if (peerId !== senderId) {
                        conn.send(payload);
                    }
                }
            }
        }

                    controlEl.className = 'control';

                        slider.oninput = (e) => {
                            const newValue = parseFloat(e.target.value);

                            control.onValueChange(newValue); // Trigger custom callback
                            // The onValueChange already calls area.update('node', this.node.id); in the node classes
                            // No need to call it again here.
                        };

                        valueDisplay.textContent = control.value.toFixed(2);

                if (context.type === 'rendered' && context.data.type === 'node') {
                    // Add a data-node-id attribute to the node's root element for easier DOM selection
                    context.data.element.setAttribute('data-node-id', context.data.payload.id);

                    // Check if node data is valid and it's a known node type
                    if (context.data.payload instanceof WebAudioNode) {
                        // Guard clause: Rete's React renderer might not have created the child elements yet.
                        // If so, we skip this render pass. The pipe will be called again.
                        if (!context.data.element.children[0]) {
                            return context;
                        }
                        const nodeView = new CustomNodeComponent(context.data.payload);
                        let elements = context.data.element.children[0].getElementsByClassName("control");
                        while(elements.length > 0){
                          elements[0].parentNode.removeChild(elements[0]);
                        }
                        context.data.element.children[0].style.height = "auto";
                        context.data.element.children[0].appendChild(nodeView.el); // Append the custom node's DOM element
                    }
                }
                // Handle socket rendering for custom nodes
                if (context.type === 'render' && context.data.type === 'socket') {
                     // Get the parent node's element
                    const nodeEl = context.data.element.closest('.node');
                    //console.log(nodeEl);
                    if (nodeEl) {
                        // Find the socket element within the custom node's rendered HTML
                        const socketType = context.data.side === 'input' ? 'input' : 'output';
                        const socketKey = context.data.key;
                        const customSocketEl = nodeEl.querySelector(`.socket.${socketType}[data-socket-key="${socketKey}"]`);
                        if (customSocketEl) {
                            //console.log(customSocketEl);
                            // Rete's AreaPlugin expects the actual socket DOM element
                            // We need to return the custom one so Rete can attach its event listeners and styles
                            context.data.element = customSocketEl;
                            // Optionally, ensure the custom socket has the correct Rete-generated classes
                            customSocketEl.classList.add('socket'); // Ensure base socket class is present
                            customSocketEl.classList.add(socketType); // Ensure input/output class is present
                        } else {
                            console.warn(`Custom socket element not found for ${socketType} ${socketKey}`);
                            return false; // Prevent Rete from trying to render a missing socket
                        }
                    }
                }
                return context;
            });


            // Rete.js v2: Events are handled differently via pipes
            editor.addPipe(async (context) => {
                if (_isLocalChange && ['nodecreated', 'noderemoved', 'connectioncreated', 'connectionremoved'].includes(context.type)) {
                    const workspaceData = editorToJSON();
                    multiplayer.broadcast(workspaceData);
                }
                if (context.type === 'nodecreate' && context.data instanceof WebAudioNode) {
                    if (context.data.label === 'Master') {
                        const existingMaster = editor.getNodes().find(n => n.label === 'Master');
                        if (existingMaster) {
                            showMessage('Only one Master Output node is allowed.', 'error');
                            return; // Stop the creation process by returning nothing
                        }
                    }
                    if(!audioContext) {
                        console.warn('AudioContext not active, Nodes will be created when "Start Audio" is clicked.');
                        showMessage(`AudioContext not active, Nodes will be created when "Start Audio" is clicked.`, 'error');
                        return context;
                    }

                    const reteNode = context.data;
                    let audioNode;
                    if (typeof reteNode.build === 'function') {
                        audioNode = reteNode.build();
                    } else {
                        console.warn(`Node type "${reteNode.label}" does not have a build method.`);
                    }

                    if (audioNode) {
                        reteAudioNodes.set(reteNode.id, audioNode);
                        showMessage(`${reteNode.label} node added to editor.`, 'info');
                        if (audioContext && audioContext.state === 'running') {
                            // If the node has a start method (like oscillators), call it.
                            reteNode.start();
                            updateAudioGraphConnections();
                        }
                    } else {
                        showMessage(`${reteNode.label} node added to editor. Audio node will be active on "Start Audio".`, 'info');
                    }
                } else if (context.type === 'noderemove') {
                    const node = context.data;
                    const audioNode = reteAudioNodes.get(node.id);
                    if (audioNode) {
                        // Stop Tone Generators
                        if ((node.label === 'Tone Generator' || node.label === 'Noise Generator') && audioNode.stop && audioNode.started) {
                            try {
                                audioNode.stop();
                                audioNode.started = false;
                            } catch (e) {
                                console.warn(`Oscillator for node ${node.id} already stopped or could not be stopped.`, e);
                            }
                        }
                        // Stop Arpeggiator
                        if (node.label === 'Arpeggiator' && audioNode.stop && audioNode.started) {
                            try {
                                audioNode.stop();
                                audioNode.started = false;
                            } catch (e) {
                                console.warn(`Arpeggiator for node ${node.id} could not be stopped.`, e);
                            }
                        }
                        // Disconnect audio nodes (Tone Generator, Gain, Filter, Delay)
                        // For Arpeggiator, disconnect its main output
                        try {
                            if (audioNode.mainOutput) {
                                audioNode.mainOutput.disconnect();
                            } else if (audioNode.disconnect) {
                                audioNode.disconnect();
                            }
                        } catch(e) {
                            console.warn("Error disconnecting node on remove:", e);
                        }
                        reteAudioNodes.delete(node.id);
                        showMessage(`${node.label} node removed from editor.`, 'info');
                        if (audioContext && audioContext.state === 'running') {
                            updateAudioGraphConnections();
                        }
                    }
                } else if (context.type === 'connectioncreate') {
                    const connection = context.data;
                    if (audioContext && audioContext.state === 'running') {
                        updateAudioGraphConnections();
                        // If a clock was just connected to a running sequencer/arpeggiator, stop its internal timer.
                        if (connection.targetInput === 'clock') {
                            const targetReteNode = editor.getNode(connection.target);
                            const targetAudioNode = reteAudioNodes.get(connection.target);
                            if (targetAudioNode && ['Arpeggiator', 'Sequencer'].includes(targetReteNode.label) && targetAudioNode.started) {
                                targetAudioNode.stop(); // Stop internal timer
                                targetAudioNode.start(); // Restart in external mode
                            }
                        }
                    }
                    showMessage('Connection created.', 'info');
                } else if (context.type === 'connectionremove') {
                    const connection = context.data;
                    if (audioContext && audioContext.state === 'running') {
                        updateAudioGraphConnections();
                        // If a clock was just disconnected, restart the node to use its internal timer.
                        if (connection.targetInput === 'clock') {
                            const targetReteNode = editor.getNode(connection.target);
                            const targetAudioNode = reteAudioNodes.get(connection.target);
                            if (targetAudioNode && ['Arpeggiator', 'Sequencer'].includes(targetReteNode.label) && targetAudioNode.started) {
                                targetAudioNode.stop();
                                targetAudioNode.start();
                            }

                    }
                    showMessage('Connection removed.', 'info');
                } else if (context.type === 'nodeeditorrendered') {
                     // This event fires after the initial editor rendering
                    AreaExtensions.zoomAt(area, editor.getNodes());
                }      
                       
                return context;
            });

            // --- Two-finger tap for Play/Stop on mobile ---
            let touchStartTime = 0;
            let touchStartCoords = { x: 0, y: 0 };
            document.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    touchStartTime = new Date().getTime();
                    touchStartCoords = { x: e.touches[0].screenX, y: e.touches[0].screenY };
                }
            }, { passive: false });

            document.addEventListener('touchend', (e) => {
                if (e.changedTouches.length === 2 || e.touches.length === 0) {
                    const touchEndTime = new Date().getTime();
                    const touchEndX = e.changedTouches[0] ? e.changedTouches[0].screenX : touchStartCoords.x;
                    const touchEndY = e.changedTouches[0] ? e.changedTouches[0].screenY : touchStartCoords.y;
                    
                    const duration = touchEndTime - touchStartTime;
                    const distance = Math.sqrt(Math.pow(touchEndX - touchStartCoords.x, 2) + Math.pow(touchEndY - touchStartCoords.y, 2));

                    if (duration < 300 && distance < 20) {
                        e.preventDefault();
                        playStopBtn.click();
                    }
                }
            }, { passive: false });
            
            // --- Initial State ---
            clearEditorBtn.disabled = false; // Initially enabled to allow clearing default workspace

            document.getElementById('cta-button').addEventListener('click', async () => {
                if(!audioContext || audioContext.state !== 'running') {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if(audioContext.state === 'suspended') {
                    audioContext.resume();
                }

                await audioContext.audioWorklet.addModule('{{ "assets/js/audio-worklets/bitcrusher-processor.js" | relative_url }}');
                await audioContext.audioWorklet.addModule('{{ "assets/js/audio-worklets/granular-processor.js" | relative_url }}');
                await audioContext.audioWorklet.addModule('{{ "assets/js/audio-worklets/vocoder-processor.js" | relative_url }}');
                
                const urlParams = new URLSearchParams(window.location.search);
                const sessionId = urlParams.get('session');

                let workspaceData = {};
                
                if (sessionId) {
                    multiplayer.connectTo(sessionId);
                } else {
                
                    workspaceData = {
                        "nodes": [
                            { "id": "1", "label": "Master Clock", "data": { "bpm": 120 }, "position": { "x": 50, "y": 300 } },
                            { "id": "2", "label": "Sequencer", "data": { "bpm": 120, "noteDuration": "1/16", "sequence": "C4 G3 D4 A3", "waveform": "sawtooth" }, "position": { "x": 300, "y": 100 } },
                            { "id": "3", "label": "Arpeggiator", "data": { "bpm": 120, "noteDuration": "1/8", "chordType": "Minor 7th", "rootNote": "A3", "arpeggioPattern": "Up-Down", "octaveRange": 2, "waveform": "sine" }, "position": { "x": 300, "y": 300 } },
                            { "id": "4", "label": "Master", "data": { "gain": 0.3 }, "position": { "x": 600, "y": 300 } },
                            { "id": "5", "label": "Scale Arpeggiator", "data": { "bpm": 120, "noteDuration": "1/16", "scaleType": "Pentatonic Minor", "rootNote": "C4", "arpeggioPattern": "Up", "octaveRange": 2, "waveform": "triangle" }, "position": { "x": 300, "y": 500 } }
                        ],
                        "connections": [
                            { "id": "conn1", "source": "1", "sourceOutput": "clock", "target": "2", "targetInput": "clock" },
                            { "id": "conn2", "source": "1", "sourceOutput": "clock", "target": "3", "targetInput": "clock" },
                            { "id": "conn3", "source": "1", "sourceOutput": "clock", "target": "5", "targetInput": "clock" },
                            { "id": "conn4", "source": "2", "sourceOutput": "audio", "target": "4", "targetInput": "audio" },
                            { "id": "conn5", "source": "3", "sourceOutput": "audio", "target": "4", "targetInput": "audio" },
                            { "id": "conn6", "source": "5", "sourceOutput": "audio", "target": "4", "targetInput": "audio" }
                        ]
                    };
                
                    {% if page.workspace_data %}
                    try {
                        workspaceData = JSON.parse(atob('{{ page.workspace_data }}'));
                        if (isWorkspaceOutdated(workspaceData)) {
                            showMessage('This workspace may be outdated. An update is available in the settings menu.', 'info');
                            const updateBtn = document.getElementById('updateWorkspaceBtn');
                            updateBtn.classList.remove('hidden');
                            updateBtn.disabled = false;
                        }
                    } catch (e) {
                        console.error('Error loading workspace data:', e);
                        showMessage('Error loading workspace data.', 'error');
                    }
                    {% endif %}
            
                    await editorFromJSON(workspaceData);
                }

                document.getElementById('hero-overlay').remove();
            });
            
            // --- Visualizer Toggle ---
            const visualizerCanvas = document.getElementById('visualizer');
            const workspaceTab = document.getElementById('workspace-tab');
            const visualizerTab = document.getElementById('visualizer-tab');
            const workspaceView = document.getElementById('workspace-view');
            const visualizerView = document.getElementById('visualizer-view');
            let gl;
            let shaderProgram;
            let positionBuffer;
            let uTime;
            let uResolution;
            let uFrequencyData;
            let frequencyDataTexture;

            function initWebGL() {
                gl = visualizerCanvas.getContext('webgl');
                if (!gl) {
                    console.error('WebGL not supported');
                    return;
                }

                const vertexShaderSource = document.getElementById('vertex-shader').text;
                const fragmentShaderSource = document.getElementById('fragment-shader').text;

                const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
                const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);

                shaderProgram = createProgram(gl, vertexShader, fragmentShader);

                const positionAttributeLocation = gl.getAttribLocation(shaderProgram, 'a_position');
                positionBuffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
                const positions = [-1, -1, 1, -1, -1, 1, 1, 1];
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);

                gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
                gl.clearColor(0, 0, 0, 0);
                gl.clear(gl.COLOR_BUFFER_BIT);

                gl.useProgram(shaderProgram);
                gl.enableVertexAttribArray(positionAttributeLocation);
                gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
                gl.vertexAttribPointer(positionAttributeLocation, 2, gl.FLOAT, false, 0, 0);

                uTime = gl.getUniformLocation(shaderProgram, 'u_time');
                uResolution = gl.getUniformLocation(shaderProgram, 'u_resolution');
                uFrequencyData = gl.getUniformLocation(shaderProgram, 'u_frequency_data');

                frequencyDataTexture = gl.createTexture();
                gl.bindTexture(gl.TEXTURE_2D, frequencyDataTexture);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
            }

            function createShader(gl, type, source) {
                const shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);
                const success = gl.getShaderParameter(shader, gl.COMPILE_STATUS);
                if (success) {
                    return shader;
                }
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
            }

            function createProgram(gl, vertexShader, fragmentShader) {
                const program = gl.createProgram();
                gl.attachShader(program, vertexShader);
                gl.attachShader(program, fragmentShader);
                gl.linkProgram(program);
                const success = gl.getProgramParameter(program, gl.LINK_STATUS);
                if (success) {
                    return program;
                }
                console.error(gl.getProgramInfoLog(program));
                gl.deleteProgram(program);
            }

            function visualize() {
                if (visualizerView.classList.contains('hidden')) {
                    return;
                }

                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                analyser.getByteFrequencyData(dataArray);

                gl.uniform1f(uTime, performance.now() / 1000);
                gl.uniform2f(uResolution, gl.canvas.width, gl.canvas.height);

                gl.bindTexture(gl.TEXTURE_2D, frequencyDataTexture);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.LUMINANCE, bufferLength, 1, 0, gl.LUMINANCE, gl.UNSIGNED_BYTE, dataArray);
                gl.uniform1i(uFrequencyData, 0);

                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

                requestAnimationFrame(visualize);
            }

            workspaceTab.addEventListener('click', () => {
                workspaceView.classList.remove('hidden');
                visualizerView.classList.add('hidden');
                workspaceTab.classList.replace('button-secondary', 'button-primary');
                visualizerTab.classList.replace('button-primary', 'button-secondary');
            });

            visualizerTab.addEventListener('click', () => {
                workspaceView.classList.add('hidden');
                visualizerView.classList.remove('hidden');
                visualizerTab.classList.replace('button-secondary', 'button-primary');
                workspaceTab.classList.replace('button-primary', 'button-secondary');

                if (!gl) {
                    initWebGL();
                }
                visualize();
            });
        };
    </script>

    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec4 a_position;
        void main() {
            gl_Position = a_position;
        }
    </script>

    <script id="fragment-shader" type="x-shader/x-fragment">
        precision mediump float;
        uniform float u_time;
        uniform sampler2D u_frequency_data;
        uniform vec2 u_resolution;

        float rand(vec2 co){
            return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453);
        }

        void main() {
            vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / u_resolution.y;

            // Audio analysis
            float bass = texture2D(u_frequency_data, vec2(0.05, 0.0)).r;
            float mid = texture2D(u_frequency_data, vec2(0.3, 0.0)).r;
            float high = texture2D(u_frequency_data, vec2(0.8, 0.0)).r;

            // --- Pulsating Circle (Sphere) ---
            float circle_radius = 0.2 + bass * 0.1;
            float circle = 1.0 - smoothstep(circle_radius - 0.01, circle_radius, length(uv));
            vec3 color = vec3(circle * bass, circle * mid, circle * high);

            // --- RGB Split (Glitch) ---
            vec2 offset = vec2(high * 0.02, 0.0);
            float r = texture2D(u_frequency_data, uv + offset).r;
            float g = texture2D(u_frequency_data, uv).r;
            float b = texture2D(u_frequency_data, uv - offset).r;

            color += vec3(r, g, b) * 0.1;

            // --- Background Chaos ---
            float time_distortion = u_time * (1.0 + mid * 2.0);
            vec2 distorted_uv = uv + vec2(
                sin(uv.y * 10.0 + time_distortion) * 0.1,
                cos(uv.x * 10.0 + time_distortion) * 0.1
            );
            color += vec3(rand(distorted_uv), rand(distorted_uv + 1.0), rand(distorted_uv + 2.0)) * 0.2;

            // --- Color Flashes ---
            if (high > 0.9) {
                color = 1.0 - color; // Invert colors on high transients
            }

            gl_FragColor = vec4(color, 1.0);
        }
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/audio/sw.js').then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }, err => {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
