        #rete {
            width: 100%;

            border-radius: 0.75rem;

        .node {
            background: #ffffff;

            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);

            font-weight: 500;
            min-width: 180px;
            box-sizing: border-box;
        }
        .node.selected {
            border-color: #4f46e5;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }
        .node .title {
            font-weight: 600;
            font-size: 1.125rem; /* text-lg */
            margin-bottom: 0.75rem;
            text-align: center;
            color: #374151;
        }
        .node .input, .node .output {
            display: flex;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .node .input-title, .node .output-title {
            flex-grow: 1;
            font-size: 0.875rem; /* text-sm */
            color: #4b5563;
        }
        .socket {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #9ca3af;
            border: 2px solid #6b7280;

            transition: background 0.2s ease-in-out, border-color 0.2s ease-in-out;
        }
        .socket.input {
            margin-right: 0.5rem;

        }
        /* Custom control styling */
        .control {

        .control label {
            display: block;

        .control input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            height: 8px;
            background: #d1d5db;
            border-radius: 5px;
            outline: none;
            opacity: 0.7;
            transition: opacity .2s;
            margin-top: 0.5rem;
        }
        .control input[type="text"] {
            width: 100%;
            padding: 0.5rem;
            border-radius: 0.25rem;
            border: 1px solid #d1d5db;
            background-color: #fff;
            color: #374151;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        .control input[type="range"]:hover {
            opacity: 1;
        }
        .control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;

            height: 20px;

</head>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/rete@2.0.0-beta.6/rete.min.js"></script>

    <script>
        // Capture global Rete.js objects into local constants after all CDN scripts have loaded

        const { ClassicPreset: Classic, NodeEditor } = window.Rete;
        const { createRoot } = window.ReactDOM;
        const { AreaExtensions, AreaPlugin } = window.ReteAreaPlugin;
        const { ConnectionPlugin, Presets: ConnectionPresets } = window.ReteConnectionPlugin;
        const { DataflowEngine } = window.ReteEngine;
        const { ReactRenderPlugin, Presets: ReactPresets } = window.ReteReactRenderPlugin
        const { ContextMenuPlugin, Presets: ContextMenuPresets } = window.ReteContextMenuPlugin;        

        // Global variables for Web Audio API
        var audioContext;
        const reteAudioNodes = new Map(); // Maps Rete.js node IDs to Web Audio API nodes

        const CHORD_TYPES = {
          'Major Triad': [0, 4, 7],
          'Minor Triad': [0, 3, 7],
          'Major 7th': [0, 4, 7, 11],
          'Minor 7th': [0, 3, 7, 10],
          'Diminished Triad': [0, 3, 6],
          'Augmented Triad': [0, 4, 8],
          'Major-Minor 7th (Dominant 7th)': [0, 4, 7, 10],
          'Half Diminished 7th (m7b5)': [0, 3, 6, 10],
          'Diminished 7th': [0, 3, 6, 9],
          'Major 9th': [0, 4, 7, 11, 14], // equivalent to [0, 4, 7, 11, 2] in the next octave
          'Minor 9th': [0, 3, 7, 10, 14], // equivalent to [0, 3, 7, 10, 2]
          'Dominant 9th': [0, 4, 7, 10, 14], // equivalent to [0, 4, 7, 10, 2]
          'Suspended 2nd (Sus2)': [0, 2, 7],
          'Suspended 4th (Sus4)': [0, 5, 7],
          'Major 6th': [0, 4, 7, 9],
          'Minor 6th': [0, 3, 7, 9],
          'Add9': [0, 4, 7, 14],
          'Minor 11th': [0, 3, 7, 10, 14, 17],
          'Major 7#11': [0, 4, 7, 11, 18],
          'Dominant 7b9': [0, 4, 7, 10, 13]
        };
        
        const ROOT_NOTES = {
            'C3': 48, 'C#3': 49, 'D3': 50, 'D#3': 51, 'E3': 52, 'F3': 53,
            'F#3': 54, 'G3': 55, 'G#3': 56, 'A3': 57, 'A#3': 58, 'B3': 59,
            'C4': 60, 'C#4': 61, 'D4': 62, 'D#4': 63, 'E4': 64, 'F4': 65,
            'F#4': 66, 'G4': 67, 'G#4': 68, 'A4': 69, 'A#4': 70, 'B4': 71
        };

        // UI Elements
        const startAudioBtn = document.getElementById('startAudioBtn');
        const stopAudioBtn = document.getElementById('stopAudioBtn');
        const addToneGeneratorNodeBtn = document.getElementById('addToneGeneratorNodeBtn');
        const addNoiseGeneratorNodeBtn = document.getElementById('addNoiseGeneratorNodeBtn');
        const addWavePlayerNodeBtn = document.getElementById('addWavePlayerNodeBtn');
        const addChordGeneratorNodeBtn = document.getElementById('addChordGeneratorNodeBtn'); // New Chord Generator Button
        const addGainNodeBtn = document.getElementById('addGainNodeBtn');
        const addFilterNodeBtn = document.getElementById('addFilterNodeBtn');
        const addDelayNodeBtn = document.getElementById('addDelayNodeBtn');
        const addArpeggiatorNodeBtn = document.getElementById('addArpeggiatorNodeBtn'); // New Button
        const addLFONodeBtn = document.getElementById('addLFONodeBtn'); // New LFO button
        const addADSREnvelopeNodeBtn = document.getElementById('addADSREnvelopeNodeBtn'); // New ADSR button
        const addBitcrusherNodeBtn = document.getElementById('addBitcrusherNodeBtn'); // New Bitcrusher button
        const addMasterGainOutputNodeBtn = document.getElementById('addMasterGainOutputNodeBtn');
        const clearEditorBtn = document.getElementById('clearEditorBtn');
        const reteContainer = document.getElementById('rete');
        const messageBox = document.getElementById('messageBox');
        const recordBtn = document.getElementById('recordBtn');
        const stopRecordBtn = document.getElementById('stopRecordBtn');
        const playRecordBtn = document.getElementById('playRecordBtn');
        const downloadRecordBtn = document.getElementById('downloadRecordBtn');
        const stopPlaybackBtn = document.getElementById('stopPlaybackBtn');


        // Rete.js Editor and Engine
        let editor;
        let area; // AreaPlugin instance
        let engine;
        let mediaRecorder;
        let recordedChunks = [];
        let recordedAudioUrl = null;
        let masterGain;
        let mediaStreamDestination;
        let loopSource;

        // --- Utility Functions ---

        function editorToJSON() {
            const nodes = [];
            for (const node of editor.getNodes()) {
                nodes.push({
                    id: node.id,
                    label: node.label,
                    data: node.data,
                    position: area.nodeViews.get(node.id).position
                });
            }

            const connections = [];
            for (const conn of editor.getConnections()) {
                const sourceNode = editor.getNode(conn.source);
                const targetNode = editor.getNode(conn.target);

                const sourceOutputKey = Object.keys(sourceNode.outputs).find(key => sourceNode.outputs[key].socket === conn.sourceOutput);
                const targetInputKey = Object.keys(targetNode.inputs).find(key => targetNode.inputs[key].socket === conn.targetInput);

                if (sourceOutputKey && targetInputKey) {
                    connections.push({
                        id: conn.id,
                        source: conn.source,
                        sourceOutputKey: sourceOutputKey,
                        target: conn.target,
                        targetInputKey: targetInputKey
                    });
                } else {
                    console.warn('Could not find socket keys for connection:', conn);
                }
            }

            return { nodes, connections };
        }

        async function editorFromJSON(json) {
            console.log('Loading editor from JSON:', json);
            await editor.clear();

            const nodeConstructors = {
                'Tone Generator': ToneGeneratorNode,
                'Noise Generator': NoiseGeneratorNode,
                'Wave Player': WavePlayerNode,
                'Chord Generator': ChordGeneratorNode,
                'Gain': GainNode,
                'Filter': FilterNode,
                'Delay': DelayNode,
                'Distortion': DistortionNode,
                'Compressor': CompressorNode,
                'Reverb': ReverbNode,
                'Arpeggiator': ArpeggiatorNode,
                'LFO': LFONode,
                'ADSR Envelope': ADSREnvelopeNode,
                'Bitcrusher': BitcrusherNode,
                'Master Gain Output': MasterGainOutputNode
            };

            // Create nodes first
            for (const nodeData of json.nodes) {
                const Constructor = nodeConstructors[nodeData.label];
                if (Constructor) {
                    const node = new Constructor();
                    node.id = nodeData.id;
                    
                    node.data = { ...node.data, ...nodeData.data };

                    await editor.addNode(node);
                    await area.translate(node.id, nodeData.position);
                    
                    for (const key in node.controls) {
                        const control = node.controls[key];
                         if (node.data.hasOwnProperty(key)) {
                             control.value = node.data[key];
                        }
                    }
                    area.update('node', node.id);

                } else {
                    console.warn(`Node type "${nodeData.label}" not found.`);
                }
            }

            // Then create connections
            for (const connData of json.connections) {
                const sourceNode = editor.getNode(connData.source);
                const targetNode = editor.getNode(connData.target);

                if (sourceNode && targetNode) {
                    const sourceOutputSocket = sourceNode.outputs[connData.sourceOutputKey]?.socket;
                    const targetInputSocket = targetNode.inputs[connData.targetInputKey]?.socket;
                    
                    if (sourceOutputSocket && targetInputSocket) {
                        await editor.addConnection(new Classic.Connection(sourceNode, sourceOutputSocket, targetNode, targetInputSocket));
                    } else {
                         console.warn(`Could not find socket for connection:`, connData);
                    }
                } else {
                    console.warn(`Could not find nodes for connection:`, connData);
                }
            }
        }        

        function getWorkspaces() {
            const workspaces = localStorage.getItem('rete-workspaces');
            return workspaces ? JSON.parse(workspaces) : {};
        }

        function populateWorkspacesDropdown() {
            const workspaces = getWorkspaces();
            const selector = document.getElementById('workspaceSelector');
            selector.innerHTML = '';
            for (const name in workspaces) {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                selector.appendChild(option);
            }
        }

        async function saveWorkspace() {
            const name = document.getElementById('workspaceName').value;
            if (!name) {
                showMessage('Please enter a name for the workspace.', 'error');
                return;
            }
            const workspaces = getWorkspaces();
            const data = editorToJSON();
            workspaces[name] = data;
            localStorage.setItem('rete-workspaces', JSON.stringify(workspaces));
            populateWorkspacesDropdown();
            showMessage(`Workspace "${name}" saved.`, 'success');
        }

        async function loadWorkspace() {
            const name = document.getElementById('workspaceSelector').value;
            if (!name) {
                showMessage('Please select a workspace to load.', 'error');
                return;
            }
            const workspaces = getWorkspaces();
            const data = workspaces[name];
            if (!data) {
                showMessage(`Workspace "${name}" not found.`, 'error');
                return;
            }

            const wasAudioRunning = audioContext && audioContext.state === 'running';
            if (wasAudioRunning) {
                await stopAudio();
            }

            await editorFromJSON(data);

            if (wasAudioRunning) {
                await startAudio();
            }

            showMessage(`Workspace "${name}" loaded.`, 'success');
        }

        function deleteWorkspace() {
            const name = document.getElementById('workspaceSelector').value;
            if (!name) {
                showMessage('Please select a workspace to delete.', 'error');
                return;
            }
            const workspaces = getWorkspaces();
            delete workspaces[name];
            localStorage.setItem('rete-workspaces', JSON.stringify(workspaces));
            populateWorkspacesDropdown();
            showMessage(`Workspace "${name}" deleted.`, 'success');
        }

        function exportWorkspace() {
            const data = editorToJSON();
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'workspace.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function importWorkspace(event) {
            const file = event.target.files[0];
            if (!file) {
                return;
            }
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    const wasAudioRunning = audioContext && audioContext.state === 'running';
                    if (wasAudioRunning) {
                        await stopAudio();
                    }
                    
                    await editorFromJSON(data);
                    if (wasAudioRunning) {
                        await startAudio();
                    }
                    showMessage('Workspace imported successfully.', 'success');

        /**
         * Converts a MIDI note number to its corresponding frequency in Hz.
         * @param {number} midiNote - The MIDI note number (e.g., 60 for C4).
         * @returns {number} The frequency in Hz.
         */
        function midiToFrequency(midiNote) {
            return 440 * Math.pow(2, (midiNote - 69) / 12);
        }

        // --- Web Audio API Management ---

        /**
         * Creates a distortion curve for a WaveShaperNode.
         * @param {number} amount - The amount of distortion (0-100).
         * @returns {Float32Array} The distortion curve.
         */
        function makeDistortionCurve(amount) {
            const k = typeof amount === 'number' ? amount : 50;
            const n_samples = 44100;
            const curve = new Float32Array(n_samples);
            const deg = Math.PI / 180;
            for (let i = 0; i < n_samples; ++i) {
                const x = i * 2 / n_samples - 1; // [-1, 1]
                curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
            }
            return curve;
        }

        /**
         * Sets the distortion curve on a WaveShaperNode.
         * @param {WaveShaperNode} waveShaperNode - The Web Audio API WaveShaperNode.
         * @param {number} amount - The amount of distortion.
         */
        function setDistortionCurve(waveShaperNode, amount) {
            if (waveShaperNode && waveShaperNode.curve) {
                waveShaperNode.curve = makeDistortionCurve(amount);
            }
        }

        async function startAudio() {
            if (!audioContext || audioContext.state === 'closed') {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioContext.createGain();
                masterGain.connect(audioContext.destination);

                mediaStreamDestination = audioContext.createMediaStreamDestination();
                masterGain.connect(mediaStreamDestination);


                const processorCode = `
                    // bitcrusher-processor.js
                    // This file will be loaded by the AudioContext's audioWorklet.addModule()

                    class BitcrusherProcessor extends AudioWorkletProcessor {
                    // Define custom parameters that can be controlled from the main thread
                    static get parameterDescriptors() {
                        return [
                        {
                            name: 'bits',
                            defaultValue: 8,
                            minValue: 1,
                            maxValue: 16,
                            automationRate: 'a-rate' // 'a-rate' for audio-rate changes (smoother)
                        },
                        {
                            name: 'sampleRateReduction', // Factor by which to reduce sample rate (e.g., 2 means half sample rate)
                            defaultValue: 1,
                            minValue: 1,
                            maxValue: 100, // Or whatever max reduction you want
                            automationRate: 'a-rate'
                        }
                        ];
                    }

                    constructor() {
                        super();
                        this.lastSample = 0; // For sample rate reduction: holds the last processed sample
                        this.phase = 0;      // For sample rate reduction: accumulator for timing
                    }

                    process(inputs, outputs, parameters) {
                        const input = inputs[0]; // Get the first input (assuming single input)
                        const output = outputs[0]; // Get the first output (assuming single output)

                        // Get the parameter values (they are arrays, even if constant, check first element)
                        const bits = parameters.bits[0];
                        const sampleRateReduction = parameters.sampleRateReduction[0];

                        // Process each channel
                        for (let channel = 0; channel < input.length; ++channel) {
                        const inputChannel = input[channel];
                        const outputChannel = output[channel];

                        for (let i = 0; i < inputChannel.length; ++i) {
                            let currentSample = inputChannel[i];

                            // --- Bit Depth Reduction ---
                            // Calculate the step size for quantization
                            const step = Math.pow(0.5, bits); // e.g., 8 bits -> 2^8 = 256 levels -> step = 1/256
                            // Quantize the sample
                            currentSample = Math.floor(currentSample / step) * step;

                            // --- Sample Rate Reduction (simple hold method) ---
                            // Increment phase by the reduction factor. When it hits 1, process a new sample.
                            this.phase += 1 / sampleRateReduction; // If reduction is 2, phase increases by 0.5 each sample
                            if (this.phase >= 1) {
                            this.phase--; // Reset phase
                            this.lastSample = currentSample; // Store the new "processed" sample
                            }
                            // Output the last processed sample (either the newly processed one or the held one)
                            outputChannel[i] = this.lastSample;
                        }
                        }
                        return true; // Indicate that the processor is still active
                    }
                    }

                    // Register the processor with a unique name
                    registerProcessor('bitcrusher-processor', BitcrusherProcessor);
                `;

                const blob = new Blob([processorCode], { type: 'application/javascript' });
                const processorUrl = URL.createObjectURL(blob);

                await audioContext.audioWorklet.addModule(processorUrl);
            }

            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            startAudioBtn.disabled = true;
            stopAudioBtn.disabled = false;
            clearEditorBtn.disabled = false;
            showMessage('Audio context started! Nodes in the editor are now active.', 'success');

            // Initialize/start audio nodes that are already in the editor
            for (const reteNode of editor.getNodes()) {
                let audioNode = reteAudioNodes.get(reteNode.id);

                if (!audioNode) {
                    // Create audio node if it doesn't exist yet by calling its build method
                    if (typeof reteNode.build === 'function') {
                        audioNode = reteNode.build(audioContext);
                    } else {
                        console.warn(`Node type "${reteNode.label}" does not have a build method.`);
                    }

                    if (audioNode) {
                        reteAudioNodes.set(reteNode.id, audioNode);
                    }
                }

                // Start the audio node by calling its start method.
                // The node itself will handle whether it needs to perform an action.
                reteNode.start();
            }
            updateAudioGraphConnections();
        }

        function startRecording() {
            if (audioContext && mediaStreamDestination) {
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(mediaStreamDestination.stream);

                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                    recordedAudioUrl = URL.createObjectURL(blob);
                    playRecordBtn.disabled = false;
                    downloadRecordBtn.disabled = false;

                recordBtn.disabled = true;
                stopRecordBtn.disabled = false;

        function playRecording() {
            if (recordedAudioUrl && audioContext) {
                if (loopSource) {
                    loopSource.stop();
                }
                fetch(recordedAudioUrl)
                    .then(response => response.arrayBuffer())
                    .then(arrayBuffer => audioContext.decodeAudioData(arrayBuffer))
                    .then(audioBuffer => {
                        loopSource = audioContext.createBufferSource();
                        loopSource.buffer = audioBuffer;
                        loopSource.loop = true;
                        loopSource.connect(audioContext.destination);
                        loopSource.start(0);
                        playRecordBtn.disabled = true;
                        stopPlaybackBtn.disabled = false;
                        showMessage('Playing recording.', 'info');
                    })
                    .catch(e => console.error('Error playing recording:', e));

        async function stopAudio() {
            // Stop all audio nodes
            reteAudioNodes.forEach((audioNode, id) => {
                const reteNode = editor.getNode(id); // Use editor.getNode(id) in v2

                // Stop oscillators
                if (reteNode && (reteNode.label === 'Tone Generator' || reteNode.label === 'Noise Generator') && audioNode.stop && audioNode.started) {
                    try {
                        audioNode.stop();
                        audioNode.started = false;
                    } catch (e) {
                        console.warn(`Oscillator for node ${id} already stopped or could not be stopped.`, e);
                    }
                }
                // Stop arpeggiator
                if (reteNode && reteNode.label === 'Arpeggiator' && audioNode.stop && audioNode.started) {
                    try {
                        audioNode.stop();
                        audioNode.started = false;
                    } catch (e) {
                        console.warn(`Arpeggiator for node ${id} could not be stopped.`, e);
                    }
                }
                
                // Disconnect each main audio node from the graph (for Arpeggiator, this would be its master gain)
                try {
                    // For Arpeggiator, we disconnect its master output. Other nodes are direct Web Audio nodes.
                    if (audioNode.mainOutput) { // Arpeggiator has a mainOutput
                        audioNode.mainOutput.disconnect();
                    } else if (audioNode.disconnect) { // Regular Web Audio nodes
                        audioNode.disconnect();
                    }
                } catch (e) {
                    console.warn("Error disconnecting audio node:", e);
                }
            });
            reteAudioNodes.clear(); // Clear the map

            if (audioContext && audioContext.state !== 'closed') {
                await audioContext.close();
                console.log('AudioContext closed.');
                audioContext = null;
            }

            startAudioBtn.disabled = false;
            stopAudioBtn.disabled = true;
            showMessage('Audio stopped.', 'info');
        }


        async function updateAudioGraphConnections() {
            if (!audioContext || !editor) return;

            // 1. Disconnect all nodes from each other and from the master gain to prepare for a full rebuild.
            // This is safer than a blanket .disconnect() as it preserves internal node routing.
            reteAudioNodes.forEach(sourceAudioNode => {
                const source = sourceAudioNode.mainOutput || sourceAudioNode;
                // Disconnect from every other node
                reteAudioNodes.forEach(targetAudioNode => {
                    if (sourceAudioNode !== targetAudioNode) {
                        try { source.disconnect(targetAudioNode); } catch(e) {}
                        if (targetAudioNode.frequency) { // For FM
                            try { source.disconnect(targetAudioNode.frequency); } catch(e) {}
                        }
                    }
                });
                // Disconnect from the final output
                try { source.disconnect(masterGain); } catch(e) {}
            });

            // 2. Determine the main audio destination (sink) for this run
            const masterOutputReteNode = editor.getNodes().find(n => n instanceof MasterGainOutputNode);
            const masterOutputAudioNode = masterOutputReteNode ? reteAudioNodes.get(masterOutputReteNode.id) : null;
            const audioSink = masterOutputAudioNode; // No fallback to masterGain

            // 3. Reconnect based on Rete.js editor's connections
            for (const connection of editor.getConnections()) {
                const sourceNode = editor.getNode(connection.source);
                const targetNode = editor.getNode(connection.target);

                // Handle AUDIO connections
                if (connection.targetInput === 'audio') {
                    let sourceAudioNode = reteAudioNodes.get(sourceNode.id);
                    let targetAudioNode = reteAudioNodes.get(targetNode.id);

                    if (sourceAudioNode && sourceAudioNode.mainOutput) {
                        sourceAudioNode = sourceAudioNode.mainOutput;
                    }
                    
                    if (sourceAudioNode && targetAudioNode) {
                        try {
                            sourceAudioNode.connect(targetAudioNode);
                            console.log(`Audio connected: ${sourceNode.label} to ${targetNode.label}`);
                        } catch (e) {
                            console.error(`Error connecting audio from ${sourceNode.label} to ${targetNode.label}:`, e);
                        }
                    }
                }
                // Handle FM connections
                else if (connection.targetInput === 'fm') {
                    let sourceAudioNode = reteAudioNodes.get(sourceNode.id);
                    let targetAudioNode = reteAudioNodes.get(targetNode.id);

                    // If the source audio node has a mainOutput property, use it as the connection source.
                    if (sourceAudioNode && sourceAudioNode.mainOutput) {
                        sourceAudioNode = sourceAudioNode.mainOutput;
                    }

                    if (sourceAudioNode && targetAudioNode && targetAudioNode.frequency) {
                        try {
                            sourceAudioNode.connect(targetAudioNode.frequency);
                            console.log(`FM connected: ${sourceNode.label} to ${targetNode.label}'s frequency`);
                        } catch (e) {
                            console.error(`Error connecting FM from ${sourceNode.label} to ${targetNode.label}:`, e);
                        }
                    }
                }
                // Handle MIDI connections
                else if (connection.sourceOutput == midiSocket.name && connection.targetInput == midiSocket.name) {
                    const sourceMidiNode = reteAudioNodes.get(connection.source);
                    const targetMidiNode = reteAudioNodes.get(connection.target);

                    if (sourceMidiNode && targetMidiNode && sourceMidiNode.addMidiOutputListener && targetMidiNode.receiveMidiNotes) {
                        // Create a specific listener for this connection
                        const listener = (midiNotes) => {
                            targetMidiNode.receiveMidiNotes(midiNotes);
                        };
                        // Store the listener on the connection object for later removal
                        connection._midiListener = listener;
                        sourceMidiNode.addMidiOutputListener(listener);
                        // console.log(`MIDI connected: ${sourceNode.label} to ${targetNode.label}`);
                    }
                }
            }

            // 4. Connect any Rete.js audio nodes that have outputs but no outgoing AUDIO connections to the audio sink.
            for (const reteNode of editor.getNodes()) {
                const audioNode = reteAudioNodes.get(reteNode.id);
                const hasAudioOutputs = Object.keys(reteNode.outputs).some(key => reteNode.outputs[key].socket === audioSocket);

                if (hasAudioOutputs) {
                    const hasOutgoingAudioConnection = editor.getConnections().some(conn => 
                        conn.source === reteNode.id && conn.sourceOutput.socket === audioSocket);

                    if (!hasOutgoingAudioConnection && audioContext && audioContext.state === 'running' && audioSink) {
                        if (audioNode) {
                            try {
                                const source = audioNode.mainOutput || audioNode;
                                source.connect(audioSink);
                            }
                            catch (e) {
                                console.error(`Error connecting ${reteNode.label} to destination:`, e);
                            }
                        }
                    }
                }

                // For Arpeggiator nodes, ensure they are started/stopped based on their tempoSource
                if (reteNode.label === 'Arpeggiator' && audioNode instanceof Arpeggiator) {
                    // Check if audio context is running to decide if Arpeggiator should be active
                    if (audioContext && audioContext.state === 'running') {
                        // Re-evaluate and potentially restart the arpeggiator's internal timer
                        audioNode.updateParameter('tempoSource', reteNode.data.tempoSource, true);
                    } else {
                        // If audio context is not running, ensure arpeggiator is stopped
                        audioNode.stop();
                    }
                }
            }

            // 5. If a master output node exists, connect it to the final masterGain
            if (masterOutputAudioNode) {
                masterOutputAudioNode.connect(masterGain);
            }
        }

        // --- New ChordGenerator Internal Class ---
        class ChordGenerator {
            constructor(audioContext, reteNodeId, data) {
                this.audioContext = audioContext;
                this.reteNodeId = reteNodeId;
                this.data = data;
                this.started = false;
                this.oscillators = [];
                this.gainNodes = []; // Individual gain nodes for each oscillator within the chord

                this.mainOutput = this.audioContext.createGain();
                this.mainOutput.gain.value = 0.5; // Default volume for chord

                this.setupNotesAndChords();
                this.updateParameter('chordType', this.data.chordType || 'Major Triad');
                this.updateParameter('rootNote', this.data.rootNote || 'C4');
                this.updateParameter('octaveRange', this.data.octaveRange || 0);
                this.updateParameter('waveformType', this.data.waveformType || 'sine');
            }

            setupNotesAndChords() {
                this.chordTypes = CHORD_TYPES;
                this.rootNotes = ROOT_NOTES;
            }

            /**
             * Returns an array of MIDI notes for the current chord, adjusted by octave.
             * @returns {number[]} Array of MIDI note numbers.
             */
            getChordNotes() {
                const chordIntervals = this.chordTypes[this.data.chordType] || this.chordTypes['Major Triad'];
                const rootMidi = this.rootNotes[this.data.rootNote] || this.rootNotes['C4'];
                const octaveAdjustment = (this.data.octaveRange || 0) * 12;

                return chordIntervals.map(interval => rootMidi + interval + octaveAdjustment);
            }

            start() {
                if (this.started) {
                    this.stop(); // Stop existing oscillators before starting new ones
                }

                const notesToPlay = this.getChordNotes();
                this.oscillators = [];
                this.gainNodes = [];

                notesToPlay.forEach(midiNote => {
                    const freq = midiToFrequency(midiNote);
                    const osc = this.audioContext.createOscillator();
                    const gain = this.audioContext.createGain();

                    osc.frequency.value = freq;
                    osc.type = this.data.waveformType || 'sine';
                    gain.gain.value = 1 / notesToPlay.length; // Distribute volume evenly

                    osc.connect(gain);
                    gain.connect(this.mainOutput);

                    osc.start();
                    this.oscillators.push(osc);
                    this.gainNodes.push(gain);
                });

                this.started = true;
            }

            stop() {
                this.oscillators.forEach(osc => {
                    try {
                        osc.stop();
                        osc.disconnect();
                    } catch (e) {
                        console.warn('Oscillator could not be stopped or disconnected:', e);
                    }
                });
                this.gainNodes.forEach(gain => gain.disconnect());
                this.oscillators = [];
                this.gainNodes = [];
                this.started = false;
            }

            /**
             * Updates a parameter and potentially restarts the sound if necessary.
             * @param {string} paramName - The name of the parameter to update (e.g., 'frequencyValue', 'waveformType').
             * @param {*} value - The new value for the parameter.
             */
            updateParameter(paramName, value) {
                this.data[paramName] = value;
                if (this.started) {
                    // For chord parameters or waveform, we need to restart the oscillators
                    if (['chordType', 'rootNote', 'octaveRange', 'waveformType'].includes(paramName)) {
                        this.start(); // Restart to apply new chord structure/waveform
                    }
                }
            }
        }

        class NoiseGenerator {
            constructor(audioContext, reteNodeId, data) {
                this.audioContext = audioContext;
                this.reteNodeId = reteNodeId;
                this.data = data;
                this.started = false;

                const bufferSize = 2 * this.audioContext.sampleRate;
                const noiseBuffer = this.audioContext.createBuffer(1, bufferSize, this.audioContext.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
                this.source = this.audioContext.createBufferSource();
                this.source.buffer = noiseBuffer;
                this.source.loop = true;

                this.mainOutput = this.audioContext.createGain();
                this.mainOutput.gain.value = this.data.gainValue !== undefined ? this.data.gainValue : 1;

                this.source.connect(this.mainOutput);
            }

            start() {
                if (this.started) return;
                try {
                    this.source.start(0);
                    this.started = true;
                } catch (e) {
                    console.warn(`Could not start NoiseGenerator for node ${this.reteNodeId}:`, e);
                }
            }

            stop() {
                if (!this.started) return;
                try {
                    this.source.stop(0);
                    this.started = false;
                } catch (e) {
                    console.warn(`Could not stop NoiseGenerator for node ${this.reteNodeId}:`, e);
                }
            }

            updateParameter(paramName, value) {
                this.data[paramName] = value;
                if (paramName === 'gainValue') {
                    this.mainOutput.gain.value = value;
                }
            }
        }

        class WavePlayer {
            constructor(audioContext, reteNodeId, data) {
                this.audioContext = audioContext;
                this.reteNodeId = reteNodeId;
                this.data = data;
                this.audioBuffer = null;
                this.mainOutput = this.audioContext.createGain();
                this.loadAudio();
            }

            async loadAudio() {
                if (!this.data.audioUrl) return;
                try {
                    const response = await fetch(this.data.audioUrl);
                    const arrayBuffer = await response.arrayBuffer();
                    this.audioBuffer = await this.audioContext.decodeAudioData(arrayBuffer);
                    showMessage('Audio loaded successfully!', 'success');
                } catch (e) {
                    console.error('Error loading audio:', e);
                    showMessage(`Error loading audio: ${e.message}`, 'error');
                }
            }

            play() {
                if (!this.audioBuffer || !this.audioContext) return;
                const source = this.audioContext.createBufferSource();
                source.buffer = this.audioBuffer;
                source.connect(this.mainOutput);
                source.start(0);

        // --- New Arpeggiator Node ---
        // Internal class to manage the Web Audio API aspects of the Arpeggiator
        class Arpeggiator {
            constructor(audioContext, reteNodeId, data) {
                this.audioContext = audioContext;
                this.reteNodeId = reteNodeId;
                this.data = data; // Reference to the Rete.js node's data
                this.started = false;
                this.intervalId = null;
                this.currentNoteIndex = 0;
                this.oscillators = [];
                this.gainNodes = [];

                // Master gain for the Arpeggiator output
                this.mainOutput = this.audioContext.createGain();
                this.mainOutput.gain.value = 0.5; // Default volume for arpeggiator

                this.setupNotesAndChords();
            }

            setupNotesAndChords() {
                // Chord definitions: MIDI offsets from root
                this.chordTypes = CHORD_TYPES;

                // Root note MIDI numbers
                this.rootNotes = ROOT_NOTES;
            }

            getArpeggioNotes() {
                const rootMidi = this.rootNotes[this.data.rootNote] || 60; // Default to C4
                const chordOffsets = this.chordTypes[this.data.chordType] || this.chordTypes['Major Triad'];
                const octaveRange = this.data.octaveRange || 1; // Number of octaves to span
                const arpeggioNotes = [];

                for (let oct = 0; oct < octaveRange; oct++) {
                    chordOffsets.forEach(offset => {
                        arpeggioNotes.push(rootMidi + offset + (oct * 12));
                    });
                }

                // First, ensure the base set of notes is sorted in ascending order.
                // This is crucial for 'Converge' and 'Diverge' to work correctly.
                const sortedNotes = [...arpeggioNotes].sort((a, b) => a - b);
                let patternResult = []; // This will hold the sequence of notes for the arpeggio

                switch (this.data.arpeggioPattern) {
                    case 'Down':
                        patternResult = [...sortedNotes].reverse();
                        break;

                    case 'Up-Down':
                        // Plays notes up, then down without repeating the highest/lowest notes
                        const reversedUpdown = [...sortedNotes].reverse();
                        patternResult = sortedNotes.concat(reversedUpdown.slice(1, -1));
                        break;

                    case 'Converge':
                        // Starts from the lowest and highest notes, moving towards the middle
                        let lowIdxConverge = 0;
                        let highIdxConverge = sortedNotes.length - 1;
                        while (lowIdxConverge <= highIdxConverge) {
                            if (lowIdxConverge === highIdxConverge) {
                                patternResult.push(sortedNotes[lowIdxConverge]);
                            } else {
                                patternResult.push(sortedNotes[lowIdxConverge]);
                                patternResult.push(sortedNotes[highIdxConverge]);
                            }
                            lowIdxConverge++;
                            highIdxConverge--;
                        }
                        break;

                    case 'Diverge':
                        // Starts from the middle notes, moving outwards towards the lowest and highest
                        const lenDiverge = sortedNotes.length;
                        let midLowIdxDiverge = Math.floor((lenDiverge - 1) / 2);
                        let midHighIdxDiverge = Math.ceil((lenDiverge - 1) / 2);

                        // If odd number of notes, the single middle note plays first
                        if (lenDiverge % 2 !== 0) {
                            patternResult.push(sortedNotes[midLowIdxDiverge]);
                            midLowIdxDiverge--;
                            midHighIdxDiverge++;
                        }

                        // Now, add notes outwards from the middle
                        while (midLowIdxDiverge >= 0 && midHighIdxDiverge < lenDiverge) {
                            patternResult.push(sortedNotes[midLowIdxDiverge]);
                            patternResult.push(sortedNotes[midHighIdxDiverge]);
                            midLowIdxDiverge--;
                            midHighIdxDiverge++;
                        }
                        break;

                    case 'Random':
                        // Shuffles the notes into a random order
                        patternResult = [...sortedNotes]; // Create a copy to shuffle
                        for (let i = patternResult.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            [patternResult[i], patternResult[j]] = [patternResult[j], patternResult[i]]; // Swap
                        }
                        break;

                    case 'Root-5th':
                        // This pattern prioritizes the root (lowest) and its perfect 5th (7 semitones above).
                        // It's implemented as "Outside-In" for simplicity within the reordering context,
                        // as generating precise 5ths not present in `arpeggioNotes` would require more complex logic.
                        // It plays lowest, highest, then second-lowest, second-highest, etc.
                        let lowIdxRoot5th = 0;
                        let highIdxRoot5th = sortedNotes.length - 1;
                        while (lowIdxRoot5th <= highIdxRoot5th) {
                            if (lowIdxRoot5th === highIdxRoot5th) {
                                patternResult.push(sortedNotes[lowIdxRoot5th]);
                            } else {
                                patternResult.push(sortedNotes[lowIdxRoot5th]);
                                patternResult.push(sortedNotes[highIdxRoot5th]);
                            }
                            lowIdxRoot5th++;
                            highIdxRoot5th--;
                        }
                        // Note: This is functionally the same as 'Converge' in terms of final note order,
                        // but 'Root-5th' often implies specific interval generation beyond simple reordering.
                        // If you need a more strict 'Root-5th' (e.g., C-G-C'-G'), the arpeggiator logic
                        // would need to generate notes based on intervals from the root, not just reorder.
                        break;

                    case 'Chord Following':
                        // In the context of an arpeggiator that plays notes sequentially,
                        // "Chord Following" often means simply playing the notes of the held chord
                        // in their natural (ascending) order.
                        // If "Chord Following" meant playing all notes *simultaneously* at each step,
                        // the arpeggiator's core playback loop would need to be re-designed to handle arrays of notes.
                        patternResult = sortedNotes; // Plays the entire chord in ascending order
                        // Comment: If this pattern is selected, the arpeggiator effectively acts as a chord repeater,
                        // playing all held notes together (if your arpeggiator's playNextNote logic supports it for a single step)
                        // or just sequentially playing them as 'Up'. For sequential playback, it's identical to 'Up'.
                        break;

                    case 'Melodic':
                        // A common "melodic" pattern is to go up, then come back down partway, or a zig-zag.
                        // Here's one interpretation: Play ascending, then descend from the second highest note down to the lowest.
                        if (sortedNotes.length === 0) {
                            patternResult = [];
                        } else if (sortedNotes.length === 1) {
                            patternResult = [...sortedNotes];
                        } else {
                            // Ascending part
                            patternResult = [...sortedNotes];

                            // Descending part from the second highest note down to the lowest
                            for (let i = sortedNotes.length - 2; i >= 0; i--) {
                                patternResult.push(sortedNotes[i]);
                            }
                        }
                        // Example: [C, E, G, C'] -> [C, E, G, C', G, E, C]
                        break;

                    default: // 'Up' pattern
                        patternResult = sortedNotes;
                        break;
                }

                return patternResult;
            }

            scheduleNote(midiNote, durationSeconds) {
                if (!this.audioContext) return;

                const frequency = midiToFrequency(midiNote);
                const osc = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();

                osc.type = this.data.waveformType || 'sine'; // Use waveform from node data
                osc.frequency.setValueAtTime(frequency, this.audioContext.currentTime);

                // Simple ADSR-like envelope (Attack and Release)
                const attackTime = 0.01;
                const releaseTime = 0.1;
                const rampTime = 0.001;

                gainNode.gain.setValueAtTime(0, this.audioContext.currentTime); // Start at 0
                gainNode.gain.linearRampToValueAtTime(0.3, this.audioContext.currentTime + attackTime); // Attack

                let myRampTime = this.audioContext.currentTime + durationSeconds - releaseTime;
                // Error when myRampTime less than 0.001
                gainNode.gain.exponentialRampToValueAtTime(rampTime, ((myRampTime < rampTime) ? rampTime : myRampTime)); // Release
                gainNode.gain.linearRampToValueAtTime(0, this.audioContext.currentTime + durationSeconds); // Turn off

                osc.connect(gainNode);
                gainNode.connect(this.mainOutput); // Connect to arpeggiator's main output

                osc.start(this.audioContext.currentTime);
                osc.stop(this.audioContext.currentTime + durationSeconds);

                // Clean up nodes after they stop
                osc.onended = () => {
                    osc.disconnect();
                    gainNode.disconnect();
                };
            }

            start() {
                if (this.started || !this.audioContext) return;

                this.started = true;
                this.currentNoteIndex = 0;

                const notes = this.getArpeggioNotes();
                const bpm = this.data.bpm || 120;
                const noteDurationMap = {
                    '1': 1, '1/2': 2, '1/4': 1, '1/8': 0.5, '1/16': 0.25, '1/32': 0.125
                };
                const noteValue = noteDurationMap[this.data.noteDuration] || 0.25; // Default to 1/16th note

                const secondsPerBeat = 60 / bpm;
                const intervalMs = (secondsPerBeat * noteValue) * 1000;

                const playNextNote = () => {
                    if (!this.started) { // Check if arpeggiator is still active
                        clearInterval(this.intervalId);
                        return;
                    }
                    if (notes.length === 0) return;

                    const midiNote = notes[this.currentNoteIndex];
                    this.scheduleNote(midiNote, secondsPerBeat * noteValue); // Use noteValue as duration

                    this.currentNoteIndex = (this.currentNoteIndex + 1) % notes.length;
                };

                // Play first note immediately, then schedule interval
                playNextNote();
                this.intervalId = setInterval(playNextNote, intervalMs);

                console.log(`Arpeggiator started with BPM: ${bpm}, Note Duration: ${this.data.noteDuration}`);
            }

            stop() {
                if (!this.started) return;
                clearInterval(this.intervalId);
                this.intervalId = null;
                this.started = false;
                console.log('Arpeggiator stopped.');
            }

            // Method to update parameters dynamically (called from Rete.js control changes)
            updateParameter(param, value) {
                this.data[param] = value;
                if (this.started) {
                    // Restart arpeggiator to apply new tempo/notes/pattern
                    this.stop();
                    this.start();
                }
            }
        }

                // Ensure the URL you use is CORS-enabled if serving from a different domain.
            }

            build(audioContext) {
                const audioNode = audioContext.createConvolver();
                // Impulse response loading is handled elsewhere, so we just create the node here.
                return audioNode;
            }

        // --- New Ambient and Lofi Nodes ---

        // LFO (Low-Frequency Oscillator) Class
        class LFOGenerator {
            constructor(audioContext, reteNodeId, data) {
                this.audioContext = audioContext;
                this.reteNodeId = reteNodeId;
                this.data = data;
                this.started = false;

                this.oscillator = this.audioContext.createOscillator();
                this.mainOutput = this.audioContext.createGain(); // Output for modulation or audible signal
                this.mainOutput.gain.value = this.data.amount || 0.5; // Modulation amount / amplitude

                this.oscillator.connect(this.mainOutput);

                this.updateParameter('frequency', this.data.frequency || 5, false);
                this.updateParameter('waveformType', this.data.waveformType || 'sine', false);
                this.updateParameter('amount', this.data.amount || 0.5, false); // Initialize amount
            }

            start() {
                if (this.started) return;
                try {
                    this.oscillator.start(0);
                    this.started = true;
                    console.log(`LFO ${this.reteNodeId} started.`);
                } catch (e) {
                    console.warn(`Could not start LFO ${this.reteNodeId}:`, e);
                }
            }

            stop() {
                if (!this.started) return;
                try {
                    this.oscillator.stop(0);
                    this.oscillator.disconnect();
                    this.mainOutput.disconnect();
                    // Recreate oscillator if it needs to be started again later
                    this.oscillator = this.audioContext.createOscillator();
                    this.oscillator.connect(this.mainOutput);
                    this.oscillator.type = this.data.waveformType;
                    this.oscillator.frequency.value = this.data.frequency;
                    
                    this.started = false;
                    console.log(`LFO ${this.reteNodeId} stopped.`);
                } catch (e) {
                    console.warn(`Could not stop LFO ${this.reteNodeId}:`, e);
                }
            }

            updateParameter(paramName, value) {
                this.data[paramName] = value;
                if (paramName === 'frequency' && this.oscillator) {
                    this.oscillator.frequency.value = value;
                } else if (paramName === 'waveformType' && this.oscillator) {
                    this.oscillator.type = value;
                } else if (paramName === 'amount' && this.mainOutput) {
                    this.mainOutput.gain.value = value;
                }
                // If LFO is running and waveform type changes, it needs to be stopped and restarted
                if (paramName === 'waveformType' && this.started) {
                    this.stop();
                    this.start();
                }
            }
        }

        // ADSR Envelope Class
        class ADSREnvelope {
            constructor(audioContext, reteNodeId, data) {
                this.audioContext = audioContext;
                this.reteNodeId = reteNodeId;
                this.data = data;
                this.started = false; // Indicates if an envelope is currently active

                this.mainOutput = this.audioContext.createGain();
                this.mainOutput.gain.value = 0; // Starts at 0

                this.updateParameter('attack', this.data.attack || 0.1, false);
                this.updateParameter('decay', this.data.decay || 0.1, false);
                this.updateParameter('sustain', this.data.sustain || 0.5, false);
                this.updateParameter('release', this.data.release || 0.2, false);
            }

            // This method would be called by a trigger (e.g., MIDI Note On)
            trigger() {
                if (!this.audioContext || this.audioContext.state !== 'running') return;

                const now = this.audioContext.currentTime;
                const gain = this.mainOutput.gain;

                // Cancel any ongoing ramps
                gain.cancelScheduledValues(now);
                gain.setValueAtTime(gain.value, now); // Set value at current time to avoid clicks if re-triggered

                // Attack
                gain.linearRampToValueAtTime(1.0, now + this.data.attack);
                // Decay
                gain.linearRampToValueAtTime(this.data.sustain, now + this.data.attack + this.data.decay);

                this.started = true;
                console.log(`ADSR ${this.reteNodeId} triggered.`);
            }

            // This method would be called by a trigger (e.g., MIDI Note Off)
            release() {
                if (!this.audioContext || this.audioContext.state !== 'running' || !this.started) return;

                const now = this.audioContext.currentTime;
                const gain = this.mainOutput.gain;

                // Cancel any ongoing ramps
                gain.cancelScheduledValues(now);
                gain.setValueAtTime(gain.value, now); // Set value at current time

                // Release
                gain.linearRampToValueAtTime(0, now + this.data.release);

                // Set a flag or listener to indicate when the envelope is fully off
                gain.onended = () => {
                    this.started = false;
                    gain.onended = null;
                };
                // It might be more robust to use a timeout if onended isn't reliable for gain nodes
                setTimeout(() => {
                    this.started = false;
                }, this.data.release * 1000 + 50); // Small buffer
                
                console.log(`ADSR ${this.reteNodeId} released.`);
            }

            // ADSR nodes generally don't have a 'stop' method in the same way as oscillators
            // because they just shape a signal. However, if we're generating a test tone
            // within the ADSR itself, we might need a 'stop'. For now, `release()` acts as
            // the signal to end the envelope.
            stop() {
                this.release(); // Ensure envelope goes to 0
            }

            updateParameter(paramName, value) {
                this.data[paramName] = value;
            }
        }

        class ADSREnvelopeNode extends ModulatorNode {
            constructor() {
                super('ADSR Envelope');
                this.addOutput('audio', new Classic.Output(audioSocket, 'Envelope Out')); // This outputs a gain value

                this.data.attack = 0.1;

                    this.data.attack = val;
                    const audioNode = reteAudioNodes.get(this.id);
                    if (audioNode instanceof ADSREnvelope) audioNode.updateParameter('attack', val);
                }));

                this.data.decay = 0.1;
                this.addControl('decay', new SliderControl('adsrDecay', 'Decay (s)', 0.01, 2, 0.01, this.data.decay, (val) => {
                    this.data.decay = val;
                    const audioNode = reteAudioNodes.get(this.id);
                    if (audioNode instanceof ADSREnvelope) audioNode.updateParameter('decay', val);
                }));

                this.data.sustain = 0.5;
                this.addControl('sustain', new SliderControl('adsrSustain', 'Sustain', 0, 1, 0.01, this.data.sustain, (val) => {
                    this.data.sustain = val;
                    const audioNode = reteAudioNodes.get(this.id);
                    if (audioNode instanceof ADSREnvelope) audioNode.updateParameter('sustain', val);
                }));

                this.data.release = 0.2;
                this.addControl('release', new SliderControl('adsrRelease', 'Release (s)', 0.01, 5, 0.01, this.data.release, (val) => {
                    this.data.release = val;
                    const audioNode = reteAudioNodes.get(this.id);
                    if (audioNode instanceof ADSREnvelope) audioNode.updateParameter('release', val);
                }));

                this.addControl('triggerBtn', new ButtonControl('triggerButton', 'Trigger', () => {
                    const audioNode = reteAudioNodes.get(this.id);
                    if (audioNode instanceof ADSREnvelope) {
                        audioNode.trigger();
                        // Automatically release after a short time for a full envelope
                        setTimeout(() => {
                            audioNode.release();
                        }, (this.data.attack + this.data.decay + 0.1) * 1000); // Trigger release after A+D phase plus a bit
                    }
                }));
            }

            build(audioContext) {
                return new ADSREnvelope(audioContext, this.id, this.data);
            }
        }

        class BitcrusherNode extends WebAudioNode {
            constructor() {
                super('Bitcrusher');
                this.addInput('audio', new Classic.Input(audioSocket, 'Audio In', true));
                this.addOutput('audio', new Classic.Output(audioSocket, 'Audio Out'));

                // The actual AudioWorkletNode will be created in startAudio().
                // this.audioNode will be assigned there.
                this.audioNode = null; // Placeholder for the live Web Audio API node

                this.data.bits = 8;
                this.addControl('bits', new SliderControl('bits', 'Bit Depth', 1, 16, 1, this.data.bits, (val) => {
                    this.data.bits = val;
                    const liveAudioNode = reteAudioNodes.get(this.id); // Assuming reteAudioNodes maps Rete node IDs to live audio nodes
                    if (liveAudioNode && liveAudioNode.parameters) {
                        // Use setValueAtTime for smooth automation of AudioParam
                        liveAudioNode.parameters.get('bits').setValueAtTime(val, audioContext.currentTime);
                    }
                }));

                this.data.sampleRateReduction = 1;
                this.addControl('sampleRateReduction', new SliderControl('sampleRateReduction', 'Sample Rate Reduction', 1, 20, 1, this.data.sampleRateReduction, (val) => {
                    this.data.sampleRateReduction = val;
                    const liveAudioNode = reteAudioNodes.get(this.id);
                    if (liveAudioNode && liveAudioNode.parameters) {
                        liveAudioNode.parameters.get('sampleRateReduction').setValueAtTime(val, audioContext.currentTime);
                    }
                }));
            }

            build(audioContext) {
                const audioNode = new AudioWorkletNode(audioContext, 'bitcrusher-processor');
                audioNode.parameters.get('bits').setValueAtTime(
                    this.data.bits !== undefined ? this.data.bits : 8,
                    audioContext.currentTime
                );
                audioNode.parameters.get('sampleRateReduction').setValueAtTime(
                    this.data.sampleRateReduction !== undefined ? this.data.sampleRateReduction : 1,
                    audioContext.currentTime
                );
                return audioNode;
            }
        }

                    this.el.appendChild(inputEl);
                }

                        controlEl.innerHTML = `
                            <label>${control.label}</label>

                            control.onValueChange(newValue); // Trigger custom callback
                            // The onValueChange already calls area.update('node', this.node.id); in the node classes

                        };
                        // Initialize value display
                        valueDisplay.textContent = control.value.toFixed(2);

                        const input = controlEl.querySelector('input');
                        input.oninput = (e) => {
                            const newValue = e.target.value;

                            control.onValueChange(newValue);
                        };
                    }

                    this.el.appendChild(controlEl);
                }

        // Initialize editor on window load
        window.onload = async () => {
            await createEditor();

            const defaultWorkspace = {
                "nodes": [
                    { "id": "4", "label": "Tone Generator", "data": { "frequency": 220, "waveform": "sine" }, "position": { "x": 100, "y": 200 } },
                    { "id": "5", "label": "Master Gain Output", "data": { "gain": 0.5 }, "position": { "x": 400, "y": 200 } }
                ],
                "connections": [
                    { "source": "4", "sourceOutputKey": "audio", "target": "5", "targetInputKey": "audio" }
                ]
            };

            await editorFromJSON(defaultWorkspace);

            populateWorkspacesDropdown();
            showMessage('Editor ready. Add nodes and then click "Start Audio" to hear sound.', 'info');

            // --- Dropdown Logic ---
            const setupDropdown = (toggleId, dropdownId) => {
                const toggle = document.getElementById(toggleId);
                const dropdown = document.getElementById(dropdownId);
                toggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    // Close other dropdowns
                    document.querySelectorAll('[id$="Dropdown"]').forEach(d => {
                        if (d.id !== dropdownId) d.classList.add('hidden');
                    });
                    dropdown.classList.toggle('hidden');
                });
            };

            setupDropdown('recordingActionsToggle', 'recordingActionsDropdown');
            setupDropdown('workspaceActionsToggle', 'workspaceActionsDropdown');
            setupDropdown('addNodeToggle', 'addNodeDropdown');

            // Close dropdowns if clicking outside
            document.addEventListener('click', (e) => {
                document.querySelectorAll('[id$="Dropdown"]').forEach(d => {
                    if (!d.contains(e.target)) {
                        d.classList.add('hidden');
                    }
                });
            });


            // --- Workspace Button Logic ---
            document.getElementById('saveWorkspaceBtn').addEventListener('click', saveWorkspace);
            document.getElementById('loadWorkspaceBtn').addEventListener('click', () => {
                loadWorkspace();
                document.getElementById('workspaceActionsDropdown').classList.add('hidden'); // Close dropdown
            });
            document.getElementById('deleteWorkspaceBtn').addEventListener('click', () => {
                deleteWorkspace();
                document.getElementById('workspaceActionsDropdown').classList.add('hidden');
            });
            document.getElementById('exportWorkspaceBtn').addEventListener('click', () => {
                exportWorkspace();
                document.getElementById('workspaceActionsDropdown').classList.add('hidden');
            });
            document.getElementById('importWorkspaceBtn').addEventListener('click', () => {
                document.getElementById('importWorkspaceInput').click();
                document.getElementById('workspaceActionsDropdown').classList.add('hidden');
            });
            document.getElementById('importWorkspaceInput').addEventListener('change', importWorkspace);


            // --- Recording Button Logic ---

            stopRecordBtn.addEventListener('click', stopRecording);
            playRecordBtn.addEventListener('click', playRecording);
            downloadRecordBtn.addEventListener('click', () => {
                downloadRecording();
                document.getElementById('recordingActionsDropdown').classList.add('hidden');
            });
            stopPlaybackBtn.addEventListener('click', () => {
                stopPlayback();
                document.getElementById('recordingActionsDropdown').classList.add('hidden');
            });

            // --- Node Addition & Editor ---
            // Close dropdown after adding a node
            document.getElementById('addNodeDropdown').addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON') {
                    document.getElementById('addNodeDropdown').classList.add('hidden');
                }
            });


            // --- Initial State ---
            stopAudioBtn.disabled = true;
            clearEditorBtn.disabled = true;
        };
