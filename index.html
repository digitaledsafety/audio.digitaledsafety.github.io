<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Frame Iframe</title>
    <style>
        /* Reset default browser margins and paddings */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevent body scrollbars if iframe content has its own */
        }

        /* Style the iframe to be full-frame */
        iframe {
            display: block; /* Iframes are inline by default, block helps with sizing */
            width: 100%;
            height: 100%;
            border: none; /* Remove default iframe border */
            overflow: hidden; /* Hide iframe scrollbars if content handles its own scrolling */
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/a/macros/digitaleducationsafety.org/s/AKfycbxkQ-AkBViTKZVambvyGunl3rm6IU4qSfNr3s9pzqo1T7dJbWjhZzhVPFZvr9Vv_v8/exec"></iframe>
</body>
</html>
