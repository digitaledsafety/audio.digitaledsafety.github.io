            'C6': 84, 'C#6': 85, 'D6': 86, 'D#6': 87, 'E6': 88, 'F6': 89, 'F#6': 90, 'G6': 91, 'G#6': 92, 'A6': 93, 'A#6': 94, 'B6': 95

        const addLFONodeBtn = document.getElementById('addLFONodeBtn'); // New LFO button
        const addADSREnvelopeNodeBtn = document.getElementById('addADSREnvelopeNodeBtn'); // New ADSR button

        // Rete.js Editor and Engine
        let editor;
        let area; // AreaPlugin instance
        let engine;
        let mediaRecorder;
        let recordedChunks = [];
        let recordedAudioUrl = null;
        let masterGain;
        let analyser;
        let mediaStreamDestination;

        // --- Utility Functions ---

        function editorToJSON() {
            const nodes = [];
            for (const node of editor.getNodes()) {
                nodes.push({
                    id: node.id,
                    label: node.label,
                    data: node.data,
                    position: area.nodeViews.get(node.id).position
                });
            }

            const connections = [];
            for (const conn of editor.getConnections()) {
                
                const sourceNode = editor.getNode(conn.source);
                const targetNode = editor.getNode(conn.target);

                connections.push({
                    id: conn.id,
                    source: conn.source,
                    sourceOutput: conn.sourceOutput,
                    target: conn.target,
                    targetInput: conn.targetInput
                });
            }

            return { nodes, connections };
        }

        async function editorFromJSON(json) {
            console.log('Loading editor from JSON:', json);
            await editor.clear();

            // TODO: How do we avoid hardcoding any new node types here?
            const nodeConstructors = {
                'Tone Generator': ToneGeneratorNode,
                'Noise Generator': NoiseGeneratorNode,
                'Wave Player': WavePlayerNode,
                'Chord Generator': ChordGeneratorNode,
                'Gain': GainNode,
                'Mixer': MixerNode,
                'Master': MasterGainOutputNode,
                'Filter': FilterNode,
                'Delay': DelayNode,
                'Distortion': DistortionNode,
                'Compressor': CompressorNode,
                'Reverb': ReverbNode,
                'Arpeggiator': ArpeggiatorNode,
                'LFO': LFONode,
                'ADSR Envelope': ADSREnvelopeNode,
                'Bitcrusher': BitcrusherNode,
                'Sequencer': SequencerNode,
                'Master Clock': MasterClockNode,
                'Clock Divider': ClockDividerNode
            };

            // Create nodes first
            for (const nodeData of json.nodes) {
                const Constructor = nodeConstructors[nodeData.label];
                if (Constructor) {
                    const node = new Constructor();
                    node.id = nodeData.id;
                    
                    // Critical: Overwrite the default data with saved data
                    node.data = { ...node.data, ...nodeData.data };

                    await editor.addNode(node);
                    await area.translate(node.id, nodeData.position);
                    
                    // Re-apply control values to the controls themselves after creation
                    for (const key in node.controls) {
                        const control = node.controls[key];
                         if (node.data.hasOwnProperty(key)) {
                             control.value = node.data[key];
                        }
                    }
                    area.update('node', node.id);


                } else {
                    console.warn(`Node type "${nodeData.label}" not found.`);
                }
            }

            // Then create connections
            for (const connData of json.connections) {
                const sourceNode = editor.getNode(connData.source);
                const targetNode = editor.getNode(connData.target);

                if (sourceNode && targetNode) {
                    const sourceOutput = connData.sourceOutput;
                    const targetInput = connData.targetInput;
                    
                    if (sourceOutput && targetInput) {
                        await editor.addConnection(new Classic.Connection(sourceNode, sourceOutput, targetNode, targetInput));
                    } else {
                         console.warn(`Could not find socket for connection:`, connData);
                    }
                } else {
                    console.warn(`Could not find nodes for connection:`, connData);
                }
            }
        }        

        function getWorkspaces() {
            const workspaces = localStorage.getItem('rete-workspaces');
            return workspaces ? JSON.parse(workspaces) : {};
        }

        function populateWorkspacesDropdown() {
            const workspaces = getWorkspaces();
            const selector = document.getElementById('workspaceSelector');
            selector.innerHTML = '';
            for (const name in workspaces) {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                selector.appendChild(option);
            }
        }

        async function saveWorkspace() {
            const name = document.getElementById('workspaceName').value;
            if (!name) {
                showMessage('Please enter a name for the workspace.', 'error');
                return;
            }
            const workspaces = getWorkspaces();
            const data = editorToJSON();
            workspaces[name] = data;
            localStorage.setItem('rete-workspaces', JSON.stringify(workspaces));
            populateWorkspacesDropdown();
            showMessage(`Workspace "${name}" saved.`, 'success');
        }

        async function loadWorkspace() {
            const name = document.getElementById('workspaceSelector').value;
            if (!name) {
                showMessage('Please select a workspace to load.', 'error');
                return;
            }
            const workspaces = getWorkspaces();
            const data = workspaces[name];
            if (!data) {
                showMessage(`Workspace "${name}" not found.`, 'error');
                return;
            }

            const wasAudioRunning = audioContext && audioContext.state === 'running';
            if (wasAudioRunning) {
                await stopAudio();
            }

        /**
         * Converts a MIDI note number to its corresponding frequency in Hz.
         * @param {number} midiNote - The MIDI note number (e.g., 60 for C4).
         * @returns {number} The frequency in Hz.

        function midiToFrequency(midiNote) {

        /**
         * Creates a distortion curve for a WaveShaperNode.
         * @param {number} amount - The amount of distortion (0-100).
         * @returns {Float32Array} The distortion curve.
         */
        function makeDistortionCurve(amount) {
            const k = typeof amount === 'number' ? amount : 50;
            const n_samples = 44100;
            const curve = new Float32Array(n_samples);
            const deg = Math.PI / 180;
            for (let i = 0; i < n_samples; ++i) {
                const x = i * 2 / n_samples - 1; // [-1, 1]
                curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
            }
            return curve;
        }

        /**
         * Sets the distortion curve on a WaveShaperNode.
         * @param {WaveShaperNode} waveShaperNode - The Web Audio API WaveShaperNode.
         * @param {number} amount - The amount of distortion.
         */
        function setDistortionCurve(waveShaperNode, amount) {
            if (waveShaperNode && waveShaperNode.curve) {
                waveShaperNode.curve = makeDistortionCurve(amount);
            }
        }

        async function startAudio() {
            if (!audioContext || audioContext.state === 'closed') {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioContext.createGain();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                masterGain.connect(analyser);
                masterGain.connect(audioContext.destination);

                mediaStreamDestination = audioContext.createMediaStreamDestination();
                masterGain.connect(mediaStreamDestination);


                const processorCode = `
                    // bitcrusher-processor.js
                    // This file will be loaded by the AudioContext's audioWorklet.addModule()

                    class BitcrusherProcessor extends AudioWorkletProcessor {
                    // Define custom parameters that can be controlled from the main thread
                    static get parameterDescriptors() {
                        return [
                        {
                            name: 'bits',
                            defaultValue: 8,
                            minValue: 1,
                            maxValue: 16,
                            automationRate: 'a-rate' // 'a-rate' for audio-rate changes (smoother)
                        },
                        {
                            name: 'sampleRateReduction', // Factor by which to reduce sample rate (e.g., 2 means half sample rate)
                            defaultValue: 1,
                            minValue: 1,
                            maxValue: 100, // Or whatever max reduction you want
                            automationRate: 'a-rate'
                        }
                        ];
                    }

                    constructor() {
                        super();
                        this.lastSample = 0; // For sample rate reduction: holds the last processed sample
                        this.phase = 0;      // For sample rate reduction: accumulator for timing
                    }

                    process(inputs, outputs, parameters) {
                        const input = inputs[0]; // Get the first input (assuming single input)
                        const output = outputs[0]; // Get the first output (assuming single output)

                        // Get the parameter values (they are arrays, even if constant, check first element)
                        const bits = parameters.bits[0];
                        const sampleRateReduction = parameters.sampleRateReduction[0];

                        // Process each channel
                        for (let channel = 0; channel < input.length; ++channel) {
                        const inputChannel = input[channel];
                        const outputChannel = output[channel];

                        for (let i = 0; i < inputChannel.length; ++i) {
                            let currentSample = inputChannel[i];

                            // --- Bit Depth Reduction ---
                            // Calculate the step size for quantization
                            const step = Math.pow(0.5, bits); // e.g., 8 bits -> 2^8 = 256 levels -> step = 1/256
                            // Quantize the sample
                            currentSample = Math.floor(currentSample / step) * step;

                            // --- Sample Rate Reduction (simple hold method) ---
                            // Increment phase by the reduction factor. When it hits 1, process a new sample.
                            this.phase += 1 / sampleRateReduction; // If reduction is 2, phase increases by 0.5 each sample
                            if (this.phase >= 1) {
                            this.phase--; // Reset phase
                            this.lastSample = currentSample; // Store the new "processed" sample
                            }
                            // Output the last processed sample (either the newly processed one or the held one)
                            outputChannel[i] = this.lastSample;
                        }
                        }
                        return true; // Indicate that the processor is still active
                    }
                    }

                    // Register the processor with a unique name
                    registerProcessor('bitcrusher-processor', BitcrusherProcessor);
                `;

                const blob = new Blob([processorCode], { type: 'application/javascript' });
                const processorUrl = URL.createObjectURL(blob);

                await audioContext.audioWorklet.addModule(processorUrl);
            }

            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

                stopRecordBtn.disabled = false;
                clearEditorBtn.disabled = false;
                showMessage('Audio context started! Nodes in the editor are now active.', 'success');

            // Initialize/start audio nodes that are already in the editor
            for (const reteNode of editor.getNodes()) {
                let audioNode = reteAudioNodes.get(reteNode.id);

                if (!audioNode) {
                    // Create audio node if it doesn't exist yet by calling its build method
                    if (typeof reteNode.build === 'function') {
                        audioNode = reteNode.build(audioContext);
                    } else {
                        console.warn(`Node type "${reteNode.label}" does not have a build method.`);
                    }

                    if (audioNode) {
                        reteAudioNodes.set(reteNode.id, audioNode);
                    }
                }

                // Start the audio node by calling its start method.
                // The node itself will handle whether it needs to perform an action.
                reteNode.start();
            }
            updateAudioGraphConnections();
        }

        async function startRecording() {

                        loopSource = audioContext.createBufferSource();
                        loopSource.buffer = audioBuffer;

                        playRecordBtn.disabled = true;

        async function stopAudio() {
            // Stop all audio nodes
            reteAudioNodes.forEach((audioNode, id) => {
                const reteNode = editor.getNode(id); // Use editor.getNode(id) in v2

                // Stop oscillators
                if (reteNode && (reteNode.label === 'Tone Generator' || reteNode.label === 'Noise Generator') && audioNode.stop && audioNode.started) {
                    try {
                        audioNode.stop();
                        audioNode.started = false;
                    } catch (e) {
                        console.warn(`Oscillator for node ${id} already stopped or could not be stopped.`, e);
                    }
                }
                // Stop arpeggiator
                if (reteNode && reteNode.label === 'Arpeggiator' && audioNode.stop && audioNode.started) {
                    try {
                        audioNode.stop();
                        audioNode.started = false;
                    } catch (e) {
                        console.warn(`Arpeggiator for node ${id} could not be stopped.`, e);
                    }
                }
                
                // Disconnect each main audio node from the graph (for Arpeggiator, this would be its master gain)
                try {
                    // For Arpeggiator, we disconnect its master output. Other nodes are direct Web Audio nodes.
                    if (audioNode.mainOutput) { // Arpeggiator has a mainOutput
                        audioNode.mainOutput.disconnect();
                    } else if (audioNode.disconnect) { // Regular Web Audio nodes
                        audioNode.disconnect();
                    }
                } catch (e) {
                    console.warn("Error disconnecting audio node:", e);
                }
            });
            reteAudioNodes.clear(); // Clear the map

            if (audioContext && audioContext.state !== 'closed') {
                await audioContext.close();
                console.log('AudioContext closed.');
                audioContext = null;
            }

            stopRecordBtn.disabled = true;
            showMessage('Audio stopped.', 'info');
        }


        async function updateAudioGraphConnections() {
            if (!audioContext || !editor) return;

            // --- Phase 1: Disconnection and State Reset ---

            // Reset all clockable nodes to internal timing by default
            reteAudioNodes.forEach(audioNode => {
                if (audioNode.isExternallyClocked !== undefined) {
                    const wasClocked = audioNode.isExternallyClocked;
                    audioNode.isExternallyClocked = false;
                    // If it was running and clocked, restart it to use its internal timer
                    if (wasClocked && audioNode.started) {
                        audioNode.stop();
                        audioNode.start();
                    }
                }
            });

            // Disconnect all existing connections (both audio and listeners)
            for (const connection of editor.getConnections()) {
                const sourceAudioNode = reteAudioNodes.get(connection.source);
                const targetAudioNode = reteAudioNodes.get(connection.target);
                const sourceReteNode = editor.getNode(connection.source);
                const targetReteNode = editor.getNode(connection.target);

                if (sourceAudioNode && targetAudioNode) {
                    // Disconnect Audio/FM
                    try {
                        const source = sourceAudioNode.mainOutput ? sourceAudioNode.mainOutput : sourceAudioNode;
                        if (connection.targetInput === 'fm' && targetAudioNode.frequency) {
                            source.disconnect(targetAudioNode.frequency);
                        } else if (targetReteNode.label === 'Mixer') {
                            const inputIndex = parseInt(connection.targetInput.replace('in', ''), 10) - 1;
                            if (targetAudioNode.inputs && targetAudioNode.inputs[inputIndex]) {
                                source.disconnect(targetAudioNode.inputs[inputIndex]);
                            }
                        } else if (source.disconnect) { // Check if disconnect method exists
                             source.disconnect(targetAudioNode);
                        }
                    } catch (e) { /* Ignore errors, connection might not have existed */ }

                    // Disconnect MIDI listeners
                    if (connection._midiListener && sourceAudioNode.removeMidiOutputListener) {
                        sourceAudioNode.removeMidiOutputListener(connection._midiListener);
                        delete connection._midiListener;
                    }

                    // Disconnect Clock listeners
                    if (connection._clockListener && sourceAudioNode.removeTickListener) {
                         if (sourceReteNode.label === 'Clock Divider') {
                            const division = parseInt(connection.sourceOutput.replace('div', ''), 10);
                            sourceAudioNode.removeTickListener(division, connection._clockListener);
                        } else {
                            sourceAudioNode.removeTickListener(connection._clockListener);
                        }
                        delete connection._clockListener;
                    }
                }
            }

             // Disconnect any nodes that were implicitly connected to the master output.
            reteAudioNodes.forEach(audioNode => {
                try {
                    const source = audioNode.mainOutput ? audioNode.mainOutput : audioNode;
                    if (source && source.disconnect) {
                       source.disconnect(masterGain);
                    }
                } catch (e) { /* Ignore */ }
            });


            // --- Phase 2: Reconnection ---

            for (const connection of editor.getConnections()) {
                const sourceReteNode = editor.getNode(connection.source);
                const targetReteNode = editor.getNode(connection.target);
                const sourceAudioNode = reteAudioNodes.get(sourceReteNode.id);
                const targetAudioNode = reteAudioNodes.get(targetReteNode.id);

                if (!sourceAudioNode || !targetAudioNode) continue;

                const sourceSocket = sourceReteNode.outputs[connection.sourceOutput]?.socket;
                const targetSocket = targetReteNode.inputs[connection.targetInput]?.socket;


                // Handle AUDIO and FM connections
                if (sourceSocket === audioSocket) {
                    const sourceOutput = sourceAudioNode.mainOutput || sourceAudioNode;
                    
                    if (targetSocket === audioSocket) { // Audio -> Audio
                        let targetInput = targetAudioNode;
                         if (targetReteNode.label === 'Mixer') {
                            const inputIndex = parseInt(connection.targetInput.replace('in', '')) - 1;
                            targetInput = targetAudioNode.inputs[inputIndex];
                        }
                        if (targetInput) sourceOutput.connect(targetInput);

                    } else if (connection.targetInput === 'fm' && targetAudioNode.frequency) { // Audio -> FM Param
                        sourceOutput.connect(targetAudioNode.frequency);
                    }
                }
                // Handle CLOCK connections
                else if (sourceSocket === clockSocket && targetSocket === clockSocket) {
                    const listener = targetAudioNode.onTick.bind(targetAudioNode);
                    connection._clockListener = listener; // Store for disconnection

                    if (sourceReteNode.label === 'Clock Divider') {
                        const division = parseInt(connection.sourceOutput.replace('div', ''), 10);
                        sourceAudioNode.addTickListener(division, listener);
                    } else { // Master Clock
                        sourceAudioNode.addTickListener(listener);
                    }

                    // Set target to external clock mode and restart if it was already running
                    if (targetAudioNode.isExternallyClocked !== undefined && !targetAudioNode.isExternallyClocked) {
                        const wasStarted = targetAudioNode.started;
                        if(wasStarted) targetAudioNode.stop();
                        targetAudioNode.isExternallyClocked = true;
                        if(wasStarted) targetAudioNode.start();
                    }
                    console.log(`Clock connected: ${sourceReteNode.label} to ${targetReteNode.label}`);
                }
                // Handle MIDI connections
                else if (sourceSocket === midiSocket && targetSocket === midiSocket) {
                    if (sourceAudioNode.addMidiOutputListener && targetAudioNode.receiveMidiNotes) {
                        const listener = (midiNotes) => targetAudioNode.receiveMidiNotes(midiNotes);
                        connection._midiListener = listener; // Store for disconnection
                        sourceAudioNode.addMidiOutputListener(listener);
                    }
                }
            }

            // --- Phase 3: Connect unconnected outputs to master ---
            const masterOutputNode = editor.getNodes().find(n => n.label === 'Master');
            const masterOutputAudioNode = masterOutputNode ? reteAudioNodes.get(masterOutputNode.id) : null;

            for (const reteNode of editor.getNodes()) {
                const audioNode = reteAudioNodes.get(reteNode.id);
                const hasAudioOutputs = Object.keys(reteNode.outputs).some(key => reteNode.outputs[key].socket === audioSocket);

                if (hasAudioOutputs) {
                    const hasOutgoingAudioConnection = editor.getConnections().some(conn => 
                        conn.source === reteNode.id && conn.sourceOutput.socket === audioSocket);

                    // Connect to destination by default, unless the node is a modulator type
                    // that explicitly sets this to false.
                    //const connectByDefault = reteNode.connectToDestinationByDefault !== false;

                    if (!hasOutgoingAudioConnection && audioContext && audioContext.state === 'running') {
                        if (audioNode) {
                            try {
                                const destination = masterOutputAudioNode || masterGain;
                                // If the audio node has a mainOutput, connect that to the master gain. Otherwise, connect the node itself.
                                if (audioNode.mainOutput) {
                                    audioNode.mainOutput.connect(destination);
                                } else if (audioNode.connect) {
                                    audioNode.connect(destination);
                                }
                            }
                            catch (e) {
                                console.error(`Error connecting ${reteNode.label} to destination:`, e);
                            }
                        }
                    }
                }

                // 4. For Arpeggiator nodes, ensure they are started/stopped based on their tempoSource
                if (reteNode.label === 'Arpeggiator' && audioNode instanceof Arpeggiator) {
                    // Check if audio context is running to decide if Arpeggiator should be active
                    if (audioContext && audioContext.state === 'running') {
                        // Re-evaluate and potentially restart the arpeggiator's internal timer
                        audioNode.updateParameter('tempoSource', reteNode.data.tempoSource, true);
                    } else {
                        // If audio context is not running, ensure arpeggiator is stopped
                        audioNode.stop();
                    }
                }
            }
        }

        // Define the common Audio Socket
        const audioSocket = new Classic.Socket('audio');
        const midiSocket = new Classic.Socket('midi');
        const clockSocket = new Classic.Socket('clock');

        // --- New ChordGenerator Internal Class ---
        class ChordGenerator {
            constructor(audioContext, reteNodeId, data) {
                this.audioContext = audioContext;
                this.reteNodeId = reteNodeId;
                this.data = data;
                this.started = false;
                this.oscillators = [];
                this.gainNodes = []; // Individual gain nodes for each oscillator within the chord

                this.mainOutput = this.audioContext.createGain();
                this.mainOutput.gain.value = 0.5; // Default volume for chord

                this.setupNotesAndChords();
                this.updateParameter('chordType', this.data.chordType || 'Major Triad');
                this.updateParameter('rootNote', this.data.rootNote || 'C4');
                this.updateParameter('octaveRange', this.data.octaveRange || 0);
                this.updateParameter('waveform', this.data.waveform || 'sine');
            }

            setupNotesAndChords() {
                this.chordTypes = CHORD_TYPES;
                this.rootNotes = ROOT_NOTES;
            }

            /**
             * Returns an array of MIDI notes for the current chord, adjusted by octave.
             * @returns {number[]} Array of MIDI note numbers.
             */
            getChordNotes() {
                const chordIntervals = this.chordTypes[this.data.chordType] || this.chordTypes['Major Triad'];
                const rootMidi = this.rootNotes[this.data.rootNote] || this.rootNotes['C4'];
                const octaveAdjustment = (this.data.octaveRange || 0) * 12;

                return chordIntervals.map(interval => rootMidi + interval + octaveAdjustment);
            }

            start() {
                if (this.started) {
                    this.stop(); // Stop existing oscillators before starting new ones
                }

                const notesToPlay = this.getChordNotes();
                this.oscillators = [];
                this.gainNodes = [];

                notesToPlay.forEach(midiNote => {
                    const freq = midiToFrequency(midiNote);
                    const osc = this.audioContext.createOscillator();
                    const gain = this.audioContext.createGain();

                    osc.frequency.value = freq;
                    osc.type = this.data.waveform || 'sine';
                    gain.gain.value = 1 / notesToPlay.length; // Distribute volume evenly

                    osc.connect(gain);
                    gain.connect(this.mainOutput);

                    osc.start();
                    this.oscillators.push(osc);
                    this.gainNodes.push(gain);
                });

                this.started = true;
            }

            stop() {

                    try {

                        osc.disconnect();
                    } catch (e) {

             */

                    if (['chordType', 'rootNote', 'octaveRange', 'waveform'].includes(paramName)) {

                    }
                }
            }
        }

                source.buffer = this.audioBuffer;
                source.connect(this.mainOutput);
                source.start(0);
            }

        // --- New Arpeggiator Node ---
        // Internal class to manage the Web Audio API aspects of the Arpeggiator
        class Arpeggiator {
            constructor(audioContext, reteNodeId, data) {
                this.audioContext = audioContext;
                this.reteNodeId = reteNodeId;
                this.data = data; // Reference to the Rete.js node's data
                this.started = false;
                this.intervalId = null;
                this.currentNoteIndex = 0;
                this.isExternallyClocked = false;
                this.oscillators = [];
                this.gainNodes = [];

                // Master gain for the Arpeggiator output
                this.mainOutput = this.audioContext.createGain();
                this.mainOutput.gain.value = 0.5; // Default volume for arpeggiator

                this.setupNotesAndChords();
            }

            setupNotesAndChords() {
                // Chord definitions: MIDI offsets from root
                this.chordTypes = CHORD_TYPES;

                // Root note MIDI numbers
                this.rootNotes = ROOT_NOTES;
            }

            getArpeggioNotes() {
                const rootMidi = this.rootNotes[this.data.rootNote] || 60; // Default to C4
                const chordOffsets = this.chordTypes[this.data.chordType] || this.chordTypes['Major Triad'];
                const octaveRange = this.data.octaveRange || 1; // Number of octaves to span
                const arpeggioNotes = [];

                for (let oct = 0; oct < octaveRange; oct++) {
                    chordOffsets.forEach(offset => {
                        arpeggioNotes.push(rootMidi + offset + (oct * 12));
                    });
                }

                // First, ensure the base set of notes is sorted in ascending order.
                // This is crucial for 'Converge' and 'Diverge' to work correctly.
                const sortedNotes = [...arpeggioNotes].sort((a, b) => a - b);
                let patternResult = []; // This will hold the sequence of notes for the arpeggio

                switch (this.data.arpeggioPattern) {
                    case 'Down':
                        patternResult = [...sortedNotes].reverse();
                        break;

                    case 'Up-Down':
                        // Plays notes up, then down without repeating the highest/lowest notes
                        const reversedUpdown = [...sortedNotes].reverse();
                        patternResult = sortedNotes.concat(reversedUpdown.slice(1, -1));
                        break;

                    case 'Converge':
                        // Starts from the lowest and highest notes, moving towards the middle
                        let lowIdxConverge = 0;
                        let highIdxConverge = sortedNotes.length - 1;
                        while (lowIdxConverge <= highIdxConverge) {
                            if (lowIdxConverge === highIdxConverge) {
                                patternResult.push(sortedNotes[lowIdxConverge]);
                            } else {
                                patternResult.push(sortedNotes[lowIdxConverge]);
                                patternResult.push(sortedNotes[highIdxConverge]);
                            }
                            lowIdxConverge++;
                            highIdxConverge--;
                        }
                        break;

                    case 'Diverge':
                        // Starts from the middle notes, moving outwards towards the lowest and highest
                        const lenDiverge = sortedNotes.length;
                        let midLowIdxDiverge = Math.floor((lenDiverge - 1) / 2);
                        let midHighIdxDiverge = Math.ceil((lenDiverge - 1) / 2);

                        // If odd number of notes, the single middle note plays first
                        if (lenDiverge % 2 !== 0) {
                            patternResult.push(sortedNotes[midLowIdxDiverge]);
                            midLowIdxDiverge--;
                            midHighIdxDiverge++;
                        }

                        // Now, add notes outwards from the middle
                        while (midLowIdxDiverge >= 0 && midHighIdxDiverge < lenDiverge) {
                            patternResult.push(sortedNotes[midLowIdxDiverge]);
                            patternResult.push(sortedNotes[midHighIdxDiverge]);
                            midLowIdxDiverge--;
                            midHighIdxDiverge++;
                        }
                        break;

                    case 'Random':
                        // Shuffles the notes into a random order
                        patternResult = [...sortedNotes]; // Create a copy to shuffle
                        for (let i = patternResult.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            [patternResult[i], patternResult[j]] = [patternResult[j], patternResult[i]]; // Swap
                        }
                        break;

                    case 'Root-5th':
                        // This pattern prioritizes the root (lowest) and its perfect 5th (7 semitones above).
                        // It's implemented as "Outside-In" for simplicity within the reordering context,
                        // as generating precise 5ths not present in `arpeggioNotes` would require more complex logic.
                        // It plays lowest, highest, then second-lowest, second-highest, etc.
                        let lowIdxRoot5th = 0;
                        let highIdxRoot5th = sortedNotes.length - 1;
                        while (lowIdxRoot5th <= highIdxRoot5th) {
                            if (lowIdxRoot5th === highIdxRoot5th) {
                                patternResult.push(sortedNotes[lowIdxRoot5th]);
                            } else {
                                patternResult.push(sortedNotes[lowIdxRoot5th]);
                                patternResult.push(sortedNotes[highIdxRoot5th]);
                            }
                            lowIdxRoot5th++;
                            highIdxRoot5th--;
                        }
                        // Note: This is functionally the same as 'Converge' in terms of final note order,
                        // but 'Root-5th' often implies specific interval generation beyond simple reordering.
                        // If you need a more strict 'Root-5th' (e.g., C-G-C'-G'), the arpeggiator logic
                        // would need to generate notes based on intervals from the root, not just reorder.
                        break;

                    case 'Chord Following':
                        // In the context of an arpeggiator that plays notes sequentially,
                        // "Chord Following" often means simply playing the notes of the held chord
                        // in their natural (ascending) order.
                        // If "Chord Following" meant playing all notes *simultaneously* at each step,
                        // the arpeggiator's core playback loop would need to be re-designed to handle arrays of notes.
                        patternResult = sortedNotes; // Plays the entire chord in ascending order
                        // Comment: If this pattern is selected, the arpeggiator effectively acts as a chord repeater,
                        // playing all held notes together (if your arpeggiator's playNextNote logic supports it for a single step)
                        // or just sequentially playing them as 'Up'. For sequential playback, it's identical to 'Up'.
                        break;

                    case 'Melodic':
                        // A common "melodic" pattern is to go up, then come back down partway, or a zig-zag.
                        // Here's one interpretation: Play ascending, then descend from the second highest note down to the lowest.
                        if (sortedNotes.length === 0) {
                            patternResult = [];
                        } else if (sortedNotes.length === 1) {
                            patternResult = [...sortedNotes];
                        } else {
                            // Ascending part
                            patternResult = [...sortedNotes];

                            // Descending part from the second highest note down to the lowest
                            for (let i = sortedNotes.length - 2; i >= 0; i--) {
                                patternResult.push(sortedNotes[i]);
                            }
                        }
                        // Example: [C, E, G, C'] -> [C, E, G, C', G, E, C]
                        break;

                    default: // 'Up' pattern
                        patternResult = sortedNotes;
                        break;
                }

                return patternResult;
            }

            scheduleNote(midiNote, durationSeconds) {
                if (!this.audioContext) return;

                const frequency = midiToFrequency(midiNote);
                const osc = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();

                osc.type = this.data.waveform || 'sine'; // Use waveform from node data
                osc.frequency.setValueAtTime(frequency, this.audioContext.currentTime);

                // Simple ADSR-like envelope (Attack and Release)
                const attackTime = 0.01;
                const releaseTime = 0.1;
                const rampTime = 0.001;

                gainNode.gain.setValueAtTime(0, this.audioContext.currentTime); // Start at 0
                gainNode.gain.linearRampToValueAtTime(0.3, this.audioContext.currentTime + attackTime); // Attack

                let myRampTime = this.audioContext.currentTime + durationSeconds - releaseTime;
                // Error when myRampTime less than 0.001
                gainNode.gain.exponentialRampToValueAtTime(rampTime, ((myRampTime < rampTime) ? rampTime : myRampTime)); // Release
                gainNode.gain.linearRampToValueAtTime(0, this.audioContext.currentTime + durationSeconds); // Turn off

                osc.connect(gainNode);
                gainNode.connect(this.mainOutput); // Connect to arpeggiator's main output

                osc.start(this.audioContext.currentTime);
                osc.stop(this.audioContext.currentTime + durationSeconds);

                // Clean up nodes after they stop
                osc.onended = () => {
                    osc.disconnect();
                    gainNode.disconnect();
                };
            }

            onTick() {
                if (this.started && this.isExternallyClocked) {
                    this.playNextNote();
                }
            }

            playNextNote() {
                const notes = this.getArpeggioNotes();
                if (notes.length === 0) return;

                const bpm = this.data.bpm || 120;
                const noteDurationMap = { '1': 1, '1/2': 0.5, '1/4': 0.25, '1/8': 0.125, '1/16': 0.0625, '1/32': 0.03125 };
                const noteValue = noteDurationMap[this.data.noteDuration] || 0.25;
                const secondsPerBeat = 60.0 / bpm;
                const stepDuration = secondsPerBeat * 4 * noteValue;

                const midiNote = notes[this.currentNoteIndex];
                this.scheduleNote(midiNote, stepDuration);

                this.currentNoteIndex = (this.currentNoteIndex + 1) % notes.length;
            }

            start() {
                if (this.started || !this.audioContext) return;
                this.started = true;
                this.currentNoteIndex = 0;

                if (this.isExternallyClocked) {

                const bpm = this.data.bpm || 120;
                const noteDurationMap = { '1': 1, '1/2': 0.5, '1/4': 0.25, '1/8': 0.125, '1/16': 0.0625, '1/32': 0.03125 };
                const noteValue = noteDurationMap[this.data.noteDuration] || 0.25;
                const secondsPerBeat = 60.0 / bpm;
                const intervalMs = (secondsPerBeat * 4 * noteValue) * 1000;

                const tick = () => {

                    this.start();

        // --- New Sequencer Node ---
        // Internal class to manage the Web Audio API aspects of the Sequencer
        class Sequencer {
            constructor(audioContext, reteNodeId, data) {
                this.audioContext = audioContext;
                this.reteNodeId = reteNodeId;
                this.data = data; // Reference to the Rete.js node's data
                this.started = false;
                this.timeoutId = null;
                this.currentStep = 0;
                this.isExternallyClocked = false;

                // Master gain for the Sequencer output
                this.mainOutput = this.audioContext.createGain();
                this.mainOutput.gain.value = 0.5; // Default volume for sequencer

                this.setupNotes();
            }

            setupNotes() {
                // Root note MIDI numbers
                this.rootNotes = ROOT_NOTES;
            }

            parseSequence() {
                const sequence = this.data.sequence || 'C4';
                const tokens = sequence
                    .replace(/([\[\(\{])/g, ' $1 ') // Openers
                    .replace(/([\]\)\}](?:[:*\/]\d*|<|\?)*)/g, ' $1 ') // Closers with modifiers
                    .split(/\s+/)
                    .filter(s => s.length > 0);
                return this.buildStructure(tokens);
            }

            generateEuclidean(pulses, steps) {
                if (pulses > steps || pulses < 0 || steps <= 0) return Array(steps).fill(0);
                const pattern = [];
                for (let i = 0; i < steps; i++) {
                    // This generates a well-distributed pattern
                    pattern.push(Math.floor(i * pulses / steps) !== Math.floor((i - 1) * pulses / steps) ? 1 : 0);
                }
                return pattern;
            }

            buildStructure(tokens) {
                const structure = [];
                const openers = ['[', '(', '{'];
                const closers = [']', ')', '}'];

                while (tokens.length > 0) {
                    const token = tokens.shift();
                    const euclideanMatch = token.match(/^([A-G#?0-9~_@]+)\*(\d+)\/(\d+)$/);
                    if (euclideanMatch) {
                        const note = euclideanMatch[1];
                        const pulses = parseInt(euclideanMatch[2], 10);
                        const steps = parseInt(euclideanMatch[3], 10);

                        if (steps > 0) {
                            const pattern = this.generateEuclidean(pulses, steps);
                            const speedModifier = `/${steps}`;
                            const generatedTokens = pattern.map(p => (p === 1 ? note : '~') + speedModifier);
                            tokens.unshift(...generatedTokens);
                            continue;
                        }
                    }

                    if (openers.includes(token)) {
                        structure.push(this.buildStructure(tokens));
                    } else if (closers.includes(token[0])) {
                        const modifierString = token.substring(1);
                        return this.applyGroupModifiers(structure, modifierString);
                    } else {
                        structure.push(token);
                    }
                }
                return this.flattenAndProcess(structure);
            }

            applyGroupModifiers(group, modifiers) {
                let modifiedGroup = [...group];

                // Polymetric Tuplets (e.g., :3 for triplets)
                const tupletMatch = modifiers.match(/:(\d+)/);
                if (tupletMatch) {
                    const tupletValue = parseInt(tupletMatch[1], 10);
                    if (tupletValue > 0) {
                        const speedModifier = `*` + tupletValue;
                        modifiedGroup = this.applyModifierRecursively(modifiedGroup, speedModifier);
                    }
                }

                // Repetition (* operator)
                const repetitionMatch = modifiers.match(/\*(\d+)/);
                if (repetitionMatch) {
                    const count = parseInt(repetitionMatch[1], 10);
                    const originalGroup = [...modifiedGroup];
                    if (count > 1) {
                        for (let i = 1; i < count; i++) {
                            modifiedGroup.push(...JSON.parse(JSON.stringify(originalGroup)));
                        }
                    } else if (count === 0) {
                        modifiedGroup = [];
                    }
                }

                // Reverse
                if (modifiers.includes('<')) {
                    modifiedGroup.reverse();
                }

                // Shuffle
                if (modifiers.includes('?')) {
                    for (let i = modifiedGroup.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [modifiedGroup[i], modifiedGroup[j]] = [modifiedGroup[j], modifiedGroup[i]];
                    }
                }

                // Speed/Subdivision (/ operator)
                const speedMatch = modifiers.match(/\/(\d+)/);
                if (speedMatch) {
                    const modifierToApply = `/` + speedMatch[1];
                    modifiedGroup = this.applyModifierRecursively(modifiedGroup, modifierToApply);
                }

                return modifiedGroup;
            }

            applyModifierRecursively(group, modifier) {
                return group.map(item => {
                    if (typeof item === 'string') {
                        return item + modifier;
                    } else if (Array.isArray(item)) {
                        return this.applyModifierRecursively(item, modifier);
                    }
                    return item;
                });
            }

            flattenAndProcess(structure) {
                const flatList = [];
                for (const item of structure) {
                    if (Array.isArray(item)) {
                        // It's a chord/group, process each note inside
                        const chord = item.map(noteString => this.parseNoteEvent(noteString));
                        flatList.push(chord);
                    } else {
                        // It's a single note
                        flatList.push(this.parseNoteEvent(item));
                    }
                }
                return flatList;
            }

            parseNoteEvent(eventString) {
                // Return a single note event object, similar to the old .map callback
                if (Array.isArray(eventString)) {
                    return eventString.map(s => this.parseNoteEvent(s));
                }
                let noteName = eventString.match(/[A-G]#?[0-9]/)?.[0] || (eventString.includes('~') ? '~' : null);
                    let speed = 1;
                    let duration = 1;
                    let elongation = 1;

                    // Speed multiplier/divider
                    const speedMatch = eventString.match(/[*\/]\d+/);
                    if (speedMatch) {
                        const operator = speedMatch[0][0];
                        const value = parseInt(speedMatch[0].substring(1), 10);
                        if (operator === '*') {
                            speed *= value;
                        } else if (operator === '/') {
                            speed /= value;
                        }
                    }

                    // Duration weight
                    const durationMatch = eventString.match(/@\d+/);
                    if (durationMatch) {
                        duration = parseInt(durationMatch[0].substring(1), 10);
                    }

                    // Elongation
                    const elongationMatch = eventString.match(/_/);
                    if (elongationMatch) {
                        elongation = 1.5;
                    }

                    const midi = noteName === '~' ? null : (this.rootNotes[noteName] || null);

                    return {
                        midi: midi,
                        speed: speed,
                        duration: duration,
                        elongation: elongation,
                        noteName: noteName
                    };
            }

            scheduleNote(midiNote, durationSeconds) {
                if (!this.audioContext) return;

                const frequency = midiToFrequency(midiNote);
                const osc = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();

                osc.type = this.data.waveform || 'sine'; // Use waveform from node data
                osc.frequency.setValueAtTime(frequency, this.audioContext.currentTime);

                // Simple ADSR-like envelope (Attack and Release)
                const attackTime = 0.01;
                const releaseTime = 0.1;
                const rampTime = 0.001;

                gainNode.gain.setValueAtTime(0, this.audioContext.currentTime); // Start at 0
                gainNode.gain.linearRampToValueAtTime(0.3, this.audioContext.currentTime + attackTime); // Attack

                let myRampTime = this.audioContext.currentTime + durationSeconds - releaseTime;
                // Error when myRampTime less than 0.001
                gainNode.gain.exponentialRampToValueAtTime(rampTime, ((myRampTime < rampTime) ? rampTime : myRampTime)); // Release
                gainNode.gain.linearRampToValueAtTime(0, this.audioContext.currentTime + durationSeconds); // Turn off

                osc.connect(gainNode);
                gainNode.connect(this.mainOutput); // Connect to sequencer's main output

                osc.start(this.audioContext.currentTime);
                osc.stop(this.audioContext.currentTime + durationSeconds);

                // Clean up nodes after they stop
                osc.onended = () => {
                    osc.disconnect();
                    gainNode.disconnect();
                };
            }

            onTick() {
                if (this.started && this.isExternallyClocked) {
                    this.playNextStep();
                }
            }

            playNextStep() {
                const sequenceEvents = this.parseSequence();
                if (sequenceEvents.length === 0) return;

                const event = sequenceEvents[this.currentStep];
                const representativeEvent = Array.isArray(event) ? event[0] : event;

                if (!representativeEvent) {
                    this.currentStep = (this.currentStep + 1) % sequenceEvents.length;
                    return;
                }

                const bpm = this.data.bpm || 120;
                const noteDurationMap = { '1': 1, '1/2': 0.5, '1/4': 0.25, '1/8': 0.125, '1/16': 0.0625, '1/32': 0.03125 };
                const baseNoteDuration = noteDurationMap[this.data.noteDuration] || 0.25;
                const secondsPerBeat = 60.0 / bpm;
                const stepDuration = secondsPerBeat * 4 * baseNoteDuration * (1 / representativeEvent.speed) * representativeEvent.duration;

                if (Array.isArray(event)) {
                    for (const note of event) {
                        if (note.midi !== null) this.scheduleNote(note.midi, stepDuration * note.elongation);
                    }
                } else {
                    if (event.midi !== null) this.scheduleNote(event.midi, stepDuration * event.elongation);
                }

                this.currentStep = (this.currentStep + 1) % sequenceEvents.length;
                return stepDuration;
            }

            start() {
                if (this.started || !this.audioContext) return;

                this.started = true;
                this.currentStep = 0;

                if (this.isExternallyClocked) {
                    console.log('Sequencer started in external clock mode.');
                    return; // Do not start internal timer
                }

                this.nextStepTime = this.audioContext.currentTime;

                const schedule = () => {
                    if (!this.started || this.isExternallyClocked) return; // Stop if no longer needed

                    const stepDuration = this.playNextStep();
                    this.timeoutId = setTimeout(schedule, stepDuration * 1000);
                };

                schedule();
                console.log(`Sequencer started with internal BPM: ${this.data.bpm}`);
            }

            stop() {
                if (!this.started) return;
                clearTimeout(this.timeoutId);
                this.timeoutId = null;
                this.started = false;
                console.log('Sequencer stopped.');
            }

            // Method to update parameters dynamically (called from Rete.js control changes)
            updateParameter(param, value) {
                this.data[param] = value;
                if (this.started) {
                    // Restart sequencer to apply new tempo/notes
                    this.stop();
                    this.start();
                }
            }
        }

        // LFO (Low-Frequency Oscillator) Class
        class LFOGenerator {
            constructor(audioContext, reteNodeId, data) {
                this.audioContext = audioContext;
                this.reteNodeId = reteNodeId;
                this.data = data;
                this.started = false;
                this.isExternallyClocked = false;

                this.oscillator = this.audioContext.createOscillator();
                this.mainOutput = this.audioContext.createGain(); // Output for modulation or audible signal
                this.mainOutput.gain.value = this.data.amount || 0.5; // Modulation amount / amplitude

                this.oscillator.connect(this.mainOutput);

                this.updateParameter('frequency', this.data.frequency || 5, false);
                this.updateParameter('waveform', this.data.waveform || 'sine', false);
                this.updateParameter('amount', this.data.amount || 0.5, false); // Initialize amount
            }

            onTick() {
                if (this.started && this.isExternallyClocked) {
                    // To reset the phase, we have to stop and start the oscillator.
                    // This is the standard Web Audio API way to achieve LFO sync.
                    this.oscillator.stop();
                    this.oscillator.disconnect();

                    this.oscillator = this.audioContext.createOscillator();
                    this.oscillator.type = this.data.waveform;
                    this.oscillator.frequency.value = this.data.frequency; // It still runs at its own frequency, but gets reset
                    this.oscillator.connect(this.mainOutput);
                    this.oscillator.start(0);
                }
            }

            start() {
                if (this.started) return;
                try {
                    this.oscillator.start(0);
                    this.started = true;
                    console.log(`LFO ${this.reteNodeId} started.`);
                } catch (e) {
                    console.warn(`Could not start LFO ${this.reteNodeId}:`, e);
                }
            }

            stop() {
                if (!this.started) return;
                try {
                    this.oscillator.stop(0);
                    this.oscillator.disconnect();
                    this.mainOutput.disconnect();
                    // Recreate oscillator if it needs to be started again later
                    this.oscillator = this.audioContext.createOscillator();
                    this.oscillator.connect(this.mainOutput);
                    this.oscillator.type = this.data.waveform;
                    this.oscillator.frequency.value = this.data.frequency;
                    
                    this.started = false;
                    console.log(`LFO ${this.reteNodeId} stopped.`);
                } catch (e) {
                    console.warn(`Could not stop LFO ${this.reteNodeId}:`, e);
                }
            }

            updateParameter(paramName, value) {
                this.data[paramName] = value;
                if (paramName === 'frequency' && this.oscillator) {
                    this.oscillator.frequency.value = value;
                } else if (paramName === 'waveform' && this.oscillator) {
                    this.oscillator.type = value;
                } else if (paramName === 'amount' && this.mainOutput) {
                    this.mainOutput.gain.value = value;
                }
                // If LFO is running and waveform type changes, it needs to be stopped and restarted
                if (paramName === 'waveform' && this.started) {
                    this.stop();
                    this.start();
                }
            }
        }

        // ADSR Envelope Class
        class ADSREnvelope {
            constructor(audioContext, reteNodeId, data) {
                this.audioContext = audioContext;
                this.reteNodeId = reteNodeId;
                this.data = data;
                this.started = false; // Indicates if an envelope is currently active

                this.mainOutput = this.audioContext.createGain();
                this.mainOutput.gain.value = 0; // Starts at 0

                this.updateParameter('attack', this.data.attack || 0.1, false);
                this.updateParameter('decay', this.data.decay || 0.1, false);
                this.updateParameter('sustain', this.data.sustain || 0.5, false);
                this.updateParameter('release', this.data.release || 0.2, false);
            }

            // This method would be called by a trigger (e.g., MIDI Note On)
            trigger() {
                if (!this.audioContext || this.audioContext.state !== 'running') return;

                const now = this.audioContext.currentTime;
                const gain = this.mainOutput.gain;

                // Cancel any ongoing ramps
                gain.cancelScheduledValues(now);
                gain.setValueAtTime(gain.value, now); // Set value at current time to avoid clicks if re-triggered

                // Attack
                gain.linearRampToValueAtTime(1.0, now + this.data.attack);
                // Decay
                gain.linearRampToValueAtTime(this.data.sustain, now + this.data.attack + this.data.decay);

                this.started = true;
                console.log(`ADSR ${this.reteNodeId} triggered.`);
            }

            // This method would be called by a trigger (e.g., MIDI Note Off)
            release() {
                if (!this.audioContext || this.audioContext.state !== 'running' || !this.started) return;

                const now = this.audioContext.currentTime;
                const gain = this.mainOutput.gain;

                // Cancel any ongoing ramps
                gain.cancelScheduledValues(now);
                gain.setValueAtTime(gain.value, now); // Set value at current time

                // Release
                gain.linearRampToValueAtTime(0, now + this.data.release);

                // Set a flag or listener to indicate when the envelope is fully off
                gain.onended = () => {
                    this.started = false;
                    gain.onended = null;
                };
                // It might be more robust to use a timeout if onended isn't reliable for gain nodes
                setTimeout(() => {
                    this.started = false;
                }, this.data.release * 1000 + 50); // Small buffer
                
                console.log(`ADSR ${this.reteNodeId} released.`);
            }

            // ADSR nodes generally don't have a 'stop' method in the same way as oscillators
            // because they just shape a signal. However, if we're generating a test tone
            // within the ADSR itself, we might need a 'stop'. For now, `release()` acts as
            // the signal to end the envelope.
            stop() {
                this.release(); // Ensure envelope goes to 0
            }

            updateParameter(paramName, value) {
                this.data[paramName] = value;
            }
        }

                            // If the node has a start method (like oscillators), call it.
                            reteNode.start();
                            updateAudioGraphConnections();
                        }
                    } else {
                        showMessage(`${reteNode.label} node added to editor. Audio node will be active on "Start Audio".`, 'info');
                    }
                } else if (context.type === 'noderemove') {
                    const node = context.data;
                    const audioNode = reteAudioNodes.get(node.id);
                    if (audioNode) {
                        // Stop Tone Generators
                        if ((node.label === 'Tone Generator' || node.label === 'Noise Generator') && audioNode.stop && audioNode.started) {
                            try {
                                audioNode.stop();
                                audioNode.started = false;
                            } catch (e) {
                                console.warn(`Oscillator for node ${node.id} already stopped or could not be stopped.`, e);
                            }
                        }
                        // Stop Arpeggiator
                        if (node.label === 'Arpeggiator' && audioNode.stop && audioNode.started) {
                            try {
                                audioNode.stop();
                                audioNode.started = false;
                            } catch (e) {
                                console.warn(`Arpeggiator for node ${node.id} could not be stopped.`, e);
                            }
                        }
                        // Disconnect audio nodes (Tone Generator, Gain, Filter, Delay)
                        // For Arpeggiator, disconnect its main output
                        try {
                            if (audioNode.mainOutput) {
                                audioNode.mainOutput.disconnect();
                            } else if (audioNode.disconnect) {
                                audioNode.disconnect();
                            }
                        } catch(e) {
                            console.warn("Error disconnecting node on remove:", e);
                        }
                        reteAudioNodes.delete(node.id);
                        showMessage(`${node.label} node removed from editor.`, 'info');
                        if (audioContext && audioContext.state === 'running') {
                            updateAudioGraphConnections();
                        }
                    }
                } else if (context.type === 'connectioncreate') {

                    }

                } else if (context.type === 'nodeeditorrendered') {
                     // This event fires after the initial editor rendering
                    AreaExtensions.zoomAt(area, editor.getNodes());
                }
                return context;
            });

            showMessage('Editor ready. Add nodes and then click "Record" or "Play" to start audio.', 'info');

            try {
                const tempAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                const processorCode = `
                    class BitcrusherProcessor extends AudioWorkletProcessor {
                        static get parameterDescriptors() {
                            return [{ name: 'bits', defaultValue: 8, minValue: 1, maxValue: 16, automationRate: 'a-rate' },
                                    { name: 'sampleRateReduction', defaultValue: 1, minValue: 1, maxValue: 100, automationRate: 'a-rate' }];
                        }
                        constructor() { super(); this.lastSample = 0; this.phase = 0; }
                        process(inputs, outputs, parameters) {
                            const input = inputs[0];
                            const output = outputs[0];
                            const bits = parameters.bits[0];
                            const sampleRateReduction = parameters.sampleRateReduction[0];
                            for (let channel = 0; channel < input.length; ++channel) {
                                const inputChannel = input[channel];
                                const outputChannel = output[channel];
                                for (let i = 0; i < inputChannel.length; ++i) {
                                    let currentSample = inputChannel[i];
                                    const step = Math.pow(0.5, bits);
                                    currentSample = Math.floor(currentSample / step) * step;
                                    this.phase += 1 / sampleRateReduction;
                                    if (this.phase >= 1) { this.phase--; this.lastSample = currentSample; }
                                    outputChannel[i] = this.lastSample;
                                }
                            }
                            return true;
                        }
                    }
                    registerProcessor('bitcrusher-processor', BitcrusherProcessor);
                `;
                const blob = new Blob([processorCode], { type: 'application/javascript' });
                const processorUrl = URL.createObjectURL(blob);
                await tempAudioContext.audioWorklet.addModule(processorUrl);

            // --- Visualizer Toggle ---
            const toggleVisualizerBtn = document.getElementById('toggleVisualizerBtn');
            const visualizerCanvas = document.getElementById('visualizer');
            let gl;
            let shaderProgram;
            let positionBuffer;
            let uTime;
            let uResolution;
            let uFrequencyData;
            let frequencyDataTexture;

            function initWebGL() {
                gl = visualizerCanvas.getContext('webgl');
                if (!gl) {
                    console.error('WebGL not supported');
                    return;
                }

                const vertexShaderSource = document.getElementById('vertex-shader').text;
                const fragmentShaderSource = document.getElementById('fragment-shader').text;

                const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
                const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);

                shaderProgram = createProgram(gl, vertexShader, fragmentShader);

                const positionAttributeLocation = gl.getAttribLocation(shaderProgram, 'a_position');
                positionBuffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
                const positions = [-1, -1, 1, -1, -1, 1, 1, 1];
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);

                gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
                gl.clearColor(0, 0, 0, 0);
                gl.clear(gl.COLOR_BUFFER_BIT);

                gl.useProgram(shaderProgram);
                gl.enableVertexAttribArray(positionAttributeLocation);
                gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
                gl.vertexAttribPointer(positionAttributeLocation, 2, gl.FLOAT, false, 0, 0);

                uTime = gl.getUniformLocation(shaderProgram, 'u_time');
                uResolution = gl.getUniformLocation(shaderProgram, 'u_resolution');
                uFrequencyData = gl.getUniformLocation(shaderProgram, 'u_frequency_data');

                frequencyDataTexture = gl.createTexture();
                gl.bindTexture(gl.TEXTURE_2D, frequencyDataTexture);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
            }

            function createShader(gl, type, source) {
                const shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);
                const success = gl.getShaderParameter(shader, gl.COMPILE_STATUS);
                if (success) {
                    return shader;
                }
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
            }

            function createProgram(gl, vertexShader, fragmentShader) {
                const program = gl.createProgram();
                gl.attachShader(program, vertexShader);
                gl.attachShader(program, fragmentShader);
                gl.linkProgram(program);
                const success = gl.getProgramParameter(program, gl.LINK_STATUS);
                if (success) {
                    return program;
                }
                console.error(gl.getProgramInfoLog(program));
                gl.deleteProgram(program);
            }

            function visualize() {
                if (visualizerCanvas.style.display === 'none') {
                    return;
                }

                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                analyser.getByteFrequencyData(dataArray);

                gl.uniform1f(uTime, performance.now() / 1000);
                gl.uniform2f(uResolution, gl.canvas.width, gl.canvas.height);

                gl.bindTexture(gl.TEXTURE_2D, frequencyDataTexture);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.LUMINANCE, bufferLength, 1, 0, gl.LUMINANCE, gl.UNSIGNED_BYTE, dataArray);
                gl.uniform1i(uFrequencyData, 0);

                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

                requestAnimationFrame(visualize);
            }

            toggleVisualizerBtn.addEventListener('click', () => {
                const isHidden = visualizerCanvas.style.display === 'none';
                visualizerCanvas.style.display = isHidden ? 'block' : 'none';
                toggleVisualizerBtn.textContent = isHidden ? '👁️ Hide Visualizer' : '👁️ Show Visualizer';
                if (isHidden) {
                    if (!gl) {
                        initWebGL();
                    }
                    visualize();
                }
            });
        };

    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec4 a_position;
        void main() {
            gl_Position = a_position;
        }
    </script>

    <script id="fragment-shader" type="x-shader/x-fragment">
        precision mediump float;
        uniform float u_time;
        uniform sampler2D u_frequency_data;
        uniform vec2 u_resolution;

        // Function to generate pseudo-random noise
        float rand(vec2 co){
            return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453);
        }

        void main() {
            vec2 uv = gl_FragCoord.xy / u_resolution.xy;

            // Sample different parts of the frequency spectrum
            float bass = texture2D(u_frequency_data, vec2(0.1, 0.0)).r;
            float mid = texture2D(u_frequency_data, vec2(0.4, 0.0)).r;
            float high = texture2D(u_frequency_data, vec2(0.8, 0.0)).r;

            // --- Glitchy coordinate distortion ---
            vec2 distorted_uv = uv;
            // Horizontal shift based on high frequencies and time
            distorted_uv.x += (rand(vec2(u_time, 0.0)) - 0.5) * high * 0.2;
            // Blocky vertical shift based on bass
            if (bass > 0.8) {
                distorted_uv.y = fract(uv.y * 10.0 + u_time);
            }

            // --- Color manipulation ---
            // Base color driven by audio and time
            vec3 color = vec3(
                sin(u_time * 2.0 + distorted_uv.x * 10.0) * 0.5 + 0.5,
                cos(u_time * 3.0 + distorted_uv.y * 15.0) * 0.5 + 0.5,
                bass * 0.8
            );

            // Sudden color inversion based on mid-range transients
            if (mid > 0.7) {
                color = 1.0 - color;
            }

            // Add some noise for a gritty feel
            color += (rand(uv + u_time) - 0.5) * 0.15;

            gl_FragColor = vec4(color, 1.0);
        }
    </script>
