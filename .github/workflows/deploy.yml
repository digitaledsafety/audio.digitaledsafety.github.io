name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# Maintain concurrency at the caller level to prevent race conditions
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  call-jekyll-deployment:
    # Use the path to your reusable workflow file
    # Example: ./.github/workflows/reusable-jekyll.yml
    # Or if in another repo: owner/repo/.github/workflows/reusable-jekyll.yml@main
    uses: digitaledsafety/workflows/.github/workflows/reusable-jekyll-playwright-deploy.yml@main
    with:
      ruby-version: '3.2'
      node-version: '20'
    secrets: inherit # Pass secrets if the reusable workflow ever needs them
